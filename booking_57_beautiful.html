<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Бронирование мест</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;700;800&family=Onest:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  /* ── ANIMATED BACKGROUND ── */
  @keyframes float1 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(30px,-50px) scale(1.1)} 66%{transform:translate(-20px,20px) scale(0.9)} }
  @keyframes float2 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(-40px,30px) scale(0.95)} 66%{transform:translate(25px,-35px) scale(1.05)} }
  @keyframes float3 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(20px,40px) scale(1.08)} }
  @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
  @keyframes pulse-ring { 0%{box-shadow:0 0 0 0 var(--accent)} 70%{box-shadow:0 0 0 6px transparent} 100%{box-shadow:0 0 0 0 transparent} }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  @keyframes fadeInUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  @keyframes slideDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }

  :root {
    --bg: #08080d;
    --surface: rgba(22,22,32,0.75);
    --surface-solid: #16161f;
    --surface2: rgba(30,30,42,0.65);
    --border: rgba(255,255,255,0.06);
    --border-strong: rgba(255,255,255,0.1);
    --accent: #7c6aff;
    --accent-rgb: 124,106,255;
    --accent2: #ff6584;
    --accent2-rgb: 255,101,132;
    --text: #eaeaf4;
    --muted: #6e6e88;
    --free: rgba(34,197,94,0.08); --free-border: rgba(34,197,94,0.25); --free-text: #4ade80;
    --booked: rgba(255,101,132,0.08); --booked-border: rgba(255,101,132,0.25); --booked-text: #fb7185;
    --blocked: rgba(255,255,255,0.02); --blocked-border: rgba(255,255,255,0.04); --blocked-text: #3a3a4a;
    --mine: rgba(124,106,255,0.1); --mine-border: rgba(124,106,255,0.3); --mine-text: #a5a0ff;
    --zone-bg: rgba(18,18,28,0.5); --zone-border: rgba(255,255,255,0.04);
    --shadow: 0 4px 32px rgba(0,0,0,0.4);
    --glow-free: rgba(34,197,94,0.15); --glow-mine: rgba(124,106,255,0.2);
    --glass: saturate(180%) blur(20px);
    --orb1: rgba(124,106,255,0.15); --orb2: rgba(255,101,132,0.1); --orb3: rgba(34,197,94,0.08);
  }
  [data-theme="light"] {
    --bg: #f4f2ff;
    --surface: rgba(255,255,255,0.72);
    --surface-solid: #ffffff;
    --surface2: rgba(240,238,255,0.65);
    --border: rgba(100,80,200,0.08);
    --border-strong: rgba(100,80,200,0.15);
    --accent: #6c5ce7;
    --accent-rgb: 108,92,231;
    --accent2: #e8456a;
    --accent2-rgb: 232,69,106;
    --text: #1a1830;
    --muted: #8a85a0;
    --free: rgba(34,197,94,0.06); --free-border: rgba(34,197,94,0.2); --free-text: #16a34a;
    --booked: rgba(232,69,106,0.06); --booked-border: rgba(232,69,106,0.2); --booked-text: #dc2656;
    --blocked: rgba(0,0,0,0.02); --blocked-border: rgba(0,0,0,0.06); --blocked-text: #b0aec0;
    --mine: rgba(108,92,231,0.08); --mine-border: rgba(108,92,231,0.22); --mine-text: #5b4bd5;
    --zone-bg: rgba(248,246,255,0.6); --zone-border: rgba(100,80,200,0.06);
    --shadow: 0 4px 32px rgba(80,60,180,0.08);
    --glow-free: rgba(34,197,94,0.12); --glow-mine: rgba(108,92,231,0.15);
    --glass: saturate(180%) blur(20px);
    --orb1: rgba(108,92,231,0.1); --orb2: rgba(232,69,106,0.07); --orb3: rgba(34,197,94,0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Onest', sans-serif; min-height: 100vh;
    overflow-x: hidden; transition: background 0.5s, color 0.5s;
  }

  /* ── ANIMATED ORBS ── */
  .bg-orbs {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
  }
  .bg-orb {
    position: absolute; border-radius: 50%; filter: blur(80px);
  }
  .bg-orb:nth-child(1) {
    width: 500px; height: 500px; background: var(--orb1);
    top: -10%; left: -5%; animation: float1 20s ease-in-out infinite;
  }
  .bg-orb:nth-child(2) {
    width: 400px; height: 400px; background: var(--orb2);
    bottom: -5%; right: -5%; animation: float2 25s ease-in-out infinite;
  }
  .bg-orb:nth-child(3) {
    width: 350px; height: 350px; background: var(--orb3);
    top: 50%; left: 50%; transform: translate(-50%,-50%);
    animation: float3 22s ease-in-out infinite;
  }

  /* ── NOISE OVERLAY ── */
  .bg-orbs::after {
    content: ''; position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    opacity: 0.5;
  }

  /* ── LAYOUT ── */
  .app {
    position: relative; z-index: 1;
    max-width: 1260px; margin: 0 auto;
    padding: 28px 28px 72px;
    display: grid;
    grid-template-columns: 1fr 340px;
    grid-template-rows: auto auto 1fr;
    grid-template-areas:
      "header  header"
      "dates   dates"
      "floor   bookings";
    gap: 0 28px;
    align-items: start;
    animation: fadeInUp 0.6s ease;
  }

  /* ── HEADER ── */
  header {
    grid-area: header;
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 22px; gap: 16px;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .header-logo {
    width: 40px; height: 40px; border-radius: 12px; flex-shrink: 0;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: #fff;
    box-shadow: 0 4px 16px rgba(var(--accent-rgb), 0.3);
    position: relative; overflow: hidden;
  }
  .header-logo::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.25) 0%, transparent 50%);
    border-radius: inherit;
  }
  .header-titles h1 {
    font-family: 'Unbounded', sans-serif; font-size: clamp(13px, 1.8vw, 17px);
    font-weight: 700; line-height: 1.2; white-space: nowrap;
  }
  .header-titles h1 span { 
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header-titles .header-sub {
    font-size: 10px; color: var(--muted); letter-spacing: 0.06em;
    font-weight: 400; margin-top: 1px;
  }

  .header-right { display: flex; align-items: center; gap: 10px; }
  .header-name {
    width: 200px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 9px 14px; border-radius: 12px;
    font-family: 'Onest', sans-serif; font-size: 13px; outline: none;
    backdrop-filter: var(--glass);
    transition: all 0.3s;
  }
  .header-name:focus { 
    border-color: var(--accent); 
    box-shadow: 0 0 0 3px rgba(var(--accent-rgb), 0.1);
  }
  .header-name::placeholder { color: var(--muted); }

  /* ── THEME TOGGLE ── */
  .theme-btn {
    flex-shrink: 0; width: 52px; height: 30px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 15px; cursor: pointer; position: relative;
    transition: all 0.4s cubic-bezier(.4,0,.2,1); outline: none;
    backdrop-filter: var(--glass);
  }
  .theme-btn::after {
    content: ''; position: absolute; top: 3px; left: 3px;
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--muted); transition: all 0.4s cubic-bezier(.4,0,.2,1);
  }
  [data-theme="light"] .theme-btn { 
    background: linear-gradient(135deg, var(--accent), #9b8aff); 
    border-color: transparent;
  }
  [data-theme="light"] .theme-btn::after { left: calc(100% - 25px); background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
  .theme-icon { font-size: 11px; position: absolute; top: 50%; transform: translateY(-50%); pointer-events: none; z-index: 1; }
  .theme-icon.moon { left: 7px; }
  .theme-icon.sun  { right: 7px; }

  /* ── DATE STRIP ── */
  .date-nav {
    grid-area: dates; position: relative;
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 22px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 18px; padding: 10px 16px;
    box-shadow: var(--shadow); 
    backdrop-filter: var(--glass);
    transition: all 0.3s;
  }
  .date-nav > button,
  .date-nav-btn {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); width: 36px; height: 36px; flex-shrink: 0;
    border-radius: 10px; cursor: pointer; font-size: 16px; transition: all 0.25s;
    display: inline-flex; align-items: center; justify-content: center;
    backdrop-filter: var(--glass);
  }
  .date-nav > button:hover,
  .date-nav-btn:hover { 
    border-color: var(--accent); color: var(--accent); 
    background: rgba(var(--accent-rgb), 0.08);
    transform: scale(1.05);
  }
  .today-btn {
    width: auto; padding: 0 14px;
    font-size: 11px; font-family: 'Onest', sans-serif; font-weight: 600;
    background: linear-gradient(135deg, rgba(var(--accent-rgb), 0.1), rgba(var(--accent2-rgb), 0.05));
    border-color: rgba(var(--accent-rgb), 0.2);
    color: var(--accent);
  }
  .today-btn:hover {
    background: linear-gradient(135deg, rgba(var(--accent-rgb), 0.2), rgba(var(--accent2-rgb), 0.1));
    border-color: var(--accent);
  }
  .date-strip { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; min-width: 0; align-items: center; user-select: none; }
  .date-strip::-webkit-scrollbar { display: none; }
  .date-nav-controls {
    display: flex; align-items: center; gap: 8px; flex-shrink: 0; margin-left: auto;
  }
  .multisel-badge {
    flex-shrink: 0; background: linear-gradient(135deg, var(--accent), #9b8aff); color: #fff;
    border-radius: 10px; height: 36px; padding: 0 14px;
    font-size: 11px; font-weight: 600; font-family: 'Onest', sans-serif;
    white-space: nowrap; line-height: 36px; display: block;
    box-shadow: 0 2px 12px rgba(var(--accent-rgb), 0.3);
  }
  .multisel-badge.hidden { display: none !important; }
  .multisel-clear {
    flex-shrink: 0; display: block;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--muted); border-radius: 10px;
    height: 36px; padding: 0 12px; line-height: 36px;
    font-size: 11px; cursor: pointer; font-family: 'Onest', sans-serif;
    transition: all 0.2s; white-space: nowrap;
    backdrop-filter: var(--glass);
  }
  .multisel-clear:hover { border-color: var(--accent2); color: var(--accent2); background: rgba(var(--accent2-rgb), 0.08); }
  .multisel-clear.hidden { display: none !important; }

  .shift-hint-icon { position: relative; display: flex; align-items: center; }
  .shift-hint-trigger {
    width: 26px; height: 26px; border-radius: 8px;
    background: linear-gradient(135deg, rgba(var(--accent-rgb),0.15), rgba(var(--accent2-rgb),0.1));
    border: 1px solid rgba(var(--accent-rgb), 0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: var(--accent); cursor: default;
    transition: all 0.3s; user-select: none; font-weight: 700;
  }
  .shift-hint-icon:hover .shift-hint-trigger {
    background: var(--accent); border-color: var(--accent); color: #fff;
    transform: scale(1.1);
  }
  .shift-hint-popup {
    position: absolute; bottom: calc(100% + 10px); left: 50%; transform: translateX(-50%);
    background: var(--text); color: var(--bg);
    font-size: 11px; font-family: 'Onest', sans-serif; font-weight: 500;
    padding: 8px 14px; border-radius: 10px; white-space: nowrap;
    opacity: 0; pointer-events: none; transition: all 0.25s; z-index: 50;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .shift-hint-popup::after {
    content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
    border: 5px solid transparent; border-top-color: var(--text);
  }
  .shift-hint-icon:hover .shift-hint-popup { opacity: 1; }

  .date-chip {
    flex-shrink: 0; width: 54px; padding: 8px 0; border-radius: 12px;
    background: var(--surface2); border: 1px solid var(--border);
    cursor: pointer; text-align: center; transition: all 0.25s cubic-bezier(.4,0,.2,1);
    user-select: none; backdrop-filter: var(--glass);
    position: relative; overflow: hidden;
  }
  .date-chip::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.05), transparent);
    opacity: 0; transition: opacity 0.25s;
  }
  .date-chip:hover::before { opacity: 1; }
  .date-chip .wd { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; font-weight: 500; }
  .date-chip .d { font-size: 16px; font-weight: 700; font-family: 'Unbounded', sans-serif; }
  .date-chip:hover:not(.weekend) { border-color: rgba(var(--accent-rgb), 0.4); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(var(--accent-rgb), 0.1); }

  .date-chip.active {
    background: linear-gradient(135deg, var(--accent), #9b8aff);
    border-color: transparent; color: #fff;
    box-shadow: 0 4px 16px rgba(var(--accent-rgb), 0.35);
    transform: translateY(-2px);
  }
  .date-chip.active .wd { color: rgba(255,255,255,0.7); }
  .date-chip.active::before { background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent); opacity: 1; }

  .date-chip.selected {
    background: linear-gradient(135deg, var(--accent), #9b8aff);
    border-color: transparent; color: #fff; opacity: 0.5;
  }
  .date-chip.selected .wd { color: rgba(255,255,255,0.8); }
  .date-chip:not(.weekend) { cursor: pointer; }
  .date-chip:not(.weekend):not(.active)::after { content: attr(data-hint); display: none; }
  .date-chip.weekend { opacity: 0.35; cursor: not-allowed; border-style: dashed; }
  .date-chip.weekend .wd { color: var(--muted); }
  .date-chip.weekend .d  { color: var(--muted); }

  /* ── FLOOR PLAN ── */
  .floor-col { grid-area: floor; }

  .room-wrap {
    display: flex; gap: 0; position: relative;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 24px; padding: 22px;
    box-shadow: var(--shadow);
    backdrop-filter: var(--glass);
    transition: all 0.3s;
    overflow: hidden;
  }
  .room-wrap::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(var(--accent-rgb), 0.3), rgba(var(--accent2-rgb), 0.3), transparent);
  }

  .room-wrap.weekend-mode::after {
    content: 'Выходной день — бронирование недоступно';
    position: absolute; inset: 0; z-index: 10;
    background: rgba(8,8,13,0.8);
    backdrop-filter: blur(8px);
    border-radius: 24px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 500; color: var(--muted);
    letter-spacing: 0.02em; pointer-events: all;
  }
  [data-theme="light"] .room-wrap.weekend-mode::after { background: rgba(244,242,255,0.85); }
  .room-inner { flex: 1; display: flex; flex-direction: column; gap: 18px; }

  /* zone cards */
  .zone {
    background: var(--zone-bg); border: 1px solid var(--zone-border);
    border-radius: 16px; padding: 16px 18px 14px;
    transition: all 0.3s;
    position: relative;
  }
  .zone::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(var(--accent-rgb), 0.02), transparent);
    border-radius: inherit;
    pointer-events: none;
  }

  .seats-row { display: grid; gap: 12px; }
  .seats-row.cols3 { grid-template-columns: repeat(3, 1fr); }

  /* ── SEAT ── */
  .seat {
    aspect-ratio: 16/7; border-radius: 14px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.3s cubic-bezier(.4,0,.2,1);
    position: relative; user-select: none; border: 1.5px solid; gap: 2px;
    backdrop-filter: var(--glass);
    overflow: hidden;
  }
  .seat::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.06), transparent 60%);
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }
  .seat:hover::before { opacity: 1; }

  .seat-num { font-family: 'Unbounded', sans-serif; font-size: 24px; font-weight: 800; line-height: 1; position: relative; z-index: 1; }
  .seat-sub { font-size: 12px; font-weight: 500; text-align: center; padding: 0 6px; letter-spacing: 0.02em; line-height: 1.3; position: relative; z-index: 1; }
  .seat-month {
    position: absolute; top: 8px; left: 10px;
    font-size: 8px; font-family: 'Onest', sans-serif; font-weight: 600;
    letter-spacing: 0.06em; opacity: 0.4; text-transform: uppercase;
  }

  .seat-week {
    display: flex; gap: 3px; align-items: center;
    position: absolute; bottom: 7px; left: 50%; transform: translateX(-50%);
    z-index: 1;
  }
  .seat-week-day {
    width: 16px; height: 4px; border-radius: 4px;
    transition: all 0.2s;
  }
  .seat-week-day.s-free    { background: #4ade80; opacity: 0.9; }
  .seat-week-day.s-mine    { background: var(--accent); opacity: 0.9; }
  .seat-week-day.s-booked  { background: var(--accent2); opacity: 0.9; }
  .seat-week-day.s-blocked { background: var(--border-strong); opacity: 0.5; }
  .seat-week-day.s-weekend { background: var(--muted); opacity: 0.12; }

  .seat.free    { background: var(--free);    border-color: var(--free-border);    color: var(--free-text); }
  .seat.booked  { background: var(--booked);  border-color: var(--booked-border);  color: var(--booked-text); cursor: default; }
  .seat.mine    { background: var(--mine);    border-color: var(--mine-border);    color: var(--mine-text); }
  .seat.blocked { background: var(--blocked); border-color: var(--blocked-border); color: var(--blocked-text); cursor: not-allowed; opacity: 0.4; }

  .seat.free:hover { 
    transform: translateY(-4px) scale(1.03); 
    box-shadow: 0 12px 28px var(--glow-free); 
    border-color: var(--free-text);
  }
  .seat.mine:hover { 
    transform: translateY(-3px) scale(1.02); 
    box-shadow: 0 8px 24px var(--glow-mine); 
    border-color: var(--mine-text);
    animation: pulse-ring 1.5s infinite;
  }

  .seat .dot { width: 6px; height: 6px; border-radius: 50%; position: absolute; top: 8px; right: 9px; z-index: 1; }
  .seat.free .dot    { background: var(--free-text); box-shadow: 0 0 6px var(--free-text); }
  .seat.booked .dot  { background: var(--booked-text); box-shadow: 0 0 6px var(--booked-text); }
  .seat.mine .dot    { background: var(--mine-text); box-shadow: 0 0 8px var(--mine-text); animation: pulse 2s infinite; }
  .seat.blocked .dot { background: var(--blocked-text); }

  /* legend */
  .legend { 
    display: flex; flex-wrap: wrap; gap: 14px; margin-top: 18px;
    padding: 10px 16px; border-radius: 12px;
    background: var(--surface); border: 1px solid var(--border);
    backdrop-filter: var(--glass);
  }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--muted); font-weight: 500; }
  .legend-dot { width: 10px; height: 10px; border-radius: 4px; border: 1.5px solid; }
  .legend-dot.free    { background: var(--free);    border-color: var(--free-border); }
  .legend-dot.booked  { background: var(--booked);  border-color: var(--booked-border); }
  .legend-dot.mine    { background: var(--mine);    border-color: var(--mine-border); }
  .legend-dot.blocked { background: var(--blocked); border-color: var(--blocked-border); }

  /* ────────────────────────────────────────────────
     BOOKINGS SIDEBAR
  ──────────────────────────────────────────────── */
  .bookings-col {
    grid-area: bookings;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 0;
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: all 0.3s;
    display: flex; flex-direction: column;
    backdrop-filter: var(--glass);
    position: relative;
  }
  .bookings-col::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(var(--accent-rgb), 0.3), transparent);
  }

  .bookings-head {
    padding: 18px 20px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .bookings-head-title {
    font-family: 'Unbounded', sans-serif; font-size: 10px;
    letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase;
  }
  .bookings-filter { display: flex; gap: 4px; }
  .filter-btn {
    padding: 4px 10px; border-radius: 8px; font-size: 10px; font-family: 'Onest', sans-serif; font-weight: 500;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--muted); cursor: pointer; transition: all 0.25s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { 
    background: linear-gradient(135deg, var(--accent), #9b8aff); 
    border-color: transparent; color: #fff;
    box-shadow: 0 2px 10px rgba(var(--accent-rgb), 0.3);
  }

  .bookings-body {
    flex: 1; overflow-y: auto; padding: 12px 14px 16px;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    max-height: 520px;
  }
  .bookings-body::-webkit-scrollbar { width: 4px; }
  .bookings-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .b-empty {
    text-align: center; padding: 40px 16px;
    color: var(--muted); font-size: 13px; line-height: 1.7;
  }
  .b-empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.3; }

  .b-day-group { margin-bottom: 14px; }
  .b-day-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px; border-radius: 10px;
    background: var(--surface2); border: 1px solid var(--border);
    cursor: pointer; user-select: none; transition: all 0.25s;
    margin-bottom: 6px; backdrop-filter: var(--glass);
  }
  .b-day-header:hover { border-color: rgba(var(--accent-rgb), 0.3); }
  .b-day-header.collapsed { margin-bottom: 0; }
  .b-day-label {
    font-family: 'Unbounded', sans-serif; font-size: 10px;
    letter-spacing: 0.1em; color: var(--text); text-transform: uppercase;
  }
  .b-day-right { display: flex; align-items: center; gap: 8px; }
  .b-day-count {
    background: linear-gradient(135deg, var(--accent), #9b8aff); color: #fff;
    border-radius: 6px; padding: 2px 8px; font-size: 9px; font-weight: 700;
    box-shadow: 0 2px 8px rgba(var(--accent-rgb), 0.25);
  }
  .b-day-count.empty { background: var(--surface-solid); border: 1px solid var(--border); color: var(--muted); box-shadow: none; }
  .b-chevron {
    color: var(--muted); font-size: 10px; transition: transform 0.3s;
    width: 14px; text-align: center;
  }
  .b-day-header.collapsed .b-chevron { transform: rotate(-90deg); }

  .b-day-items { display: flex; flex-direction: column; gap: 5px; overflow: hidden; animation: slideDown 0.2s ease; }
  .b-day-items.hidden { display: none; }

  .b-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; border-radius: 12px;
    background: var(--zone-bg); border: 1px solid var(--zone-border);
    transition: all 0.25s; backdrop-filter: var(--glass);
  }
  .b-row:hover { border-color: rgba(var(--accent-rgb), 0.15); transform: translateX(2px); }
  .b-row.is-mine { 
    border-color: var(--mine-border); background: var(--mine); 
    box-shadow: 0 2px 12px rgba(var(--accent-rgb), 0.08);
  }

  .b-seat-badge {
    flex-shrink: 0; width: 32px; height: 32px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Unbounded', sans-serif; font-size: 12px; font-weight: 700;
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  }
  .b-row.is-mine .b-seat-badge { 
    background: linear-gradient(135deg, rgba(var(--accent-rgb), 0.15), rgba(var(--accent-rgb), 0.05));
    border-color: var(--mine-border); color: var(--mine-text); 
  }

  .b-info { flex: 1; min-width: 0; }
  .b-name { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .b-row.is-mine .b-name { color: var(--mine-text); }
  .b-time { font-size: 10px; color: var(--muted); margin-top: 2px; }

  .b-cancel-btn {
    flex-shrink: 0; width: 26px; height: 26px; border-radius: 8px;
    border: 1px solid var(--border); background: transparent;
    color: var(--muted); cursor: pointer; font-size: 11px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.25s; opacity: 0;
  }
  .b-row:hover .b-cancel-btn { opacity: 1; }
  .b-cancel-btn:hover { 
    background: rgba(var(--accent2-rgb), 0.12); 
    border-color: var(--booked-border); 
    color: var(--booked-text); 
    transform: scale(1.1);
  }

  /* ── MODAL ── */
  .modal-dates {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-bottom: 16px;
  }
  .modal-date-chip {
    padding: 5px 12px; border-radius: 10px; font-size: 12px; font-weight: 500;
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    font-family: 'Onest', sans-serif; backdrop-filter: var(--glass);
  }
  .modal-date-chip.single { font-size: 14px; padding: 6px 14px; font-weight: 600; }
  .modal-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(12px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.35s;
  }
  .modal-overlay.show { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface-solid); border: 1px solid var(--border);
    border-radius: 24px; padding: 32px; width: 100%; max-width: 360px;
    transform: translateY(20px) scale(0.96);
    transition: transform 0.4s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 24px 80px rgba(0,0,0,0.4);
    position: relative; overflow: hidden;
  }
  .modal::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent));
    background-size: 200% 100%;
    animation: shimmer 3s linear infinite;
  }
  .modal-overlay.show .modal { transform: none; }
  .modal h2 { font-family: 'Unbounded', sans-serif; font-size: 18px; margin-bottom: 6px; font-weight: 700; }
  .modal .sub { font-size: 13px; color: var(--muted); margin-bottom: 22px; }
  .modal .info-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 13px; }
  .modal .info-row span:first-child { color: var(--muted); }
  .modal .info-row span:last-child { font-weight: 600; }
  .modal-btns { display: flex; gap: 10px; margin-top: 22px; }
  .btn { 
    flex: 1; padding: 12px; border-radius: 12px; border: none; 
    font-family: 'Onest', sans-serif; font-size: 13px; font-weight: 600; 
    cursor: pointer; transition: all 0.3s cubic-bezier(.4,0,.2,1);
    position: relative; overflow: hidden;
  }
  .btn::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
    opacity: 0; transition: opacity 0.3s;
  }
  .btn:hover::before { opacity: 1; }
  .btn-primary { 
    background: linear-gradient(135deg, var(--accent), #9b8aff); color: #fff; 
    box-shadow: 0 4px 16px rgba(var(--accent-rgb), 0.3);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(var(--accent-rgb), 0.4); }
  .btn-danger { 
    background: rgba(var(--accent2-rgb), 0.1); color: var(--accent2); 
    border: 1px solid rgba(var(--accent2-rgb), 0.2); 
  }
  .btn-danger:hover { background: rgba(var(--accent2-rgb), 0.18); transform: translateY(-1px); }
  .btn-cancel { 
    background: var(--surface2); color: var(--muted); border: 1px solid var(--border); 
  }
  .btn-cancel:hover { color: var(--text); border-color: var(--muted); }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--surface-solid); border: 1px solid var(--border);
    padding: 12px 24px; border-radius: 14px; font-size: 13px; font-weight: 500;
    transition: transform 0.4s cubic-bezier(.4,0,.2,1);
    z-index: 200; white-space: nowrap; box-shadow: 0 12px 40px rgba(0,0,0,0.3);
    backdrop-filter: blur(20px);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--free-border); color: var(--free-text); }
  .toast.cancel  { border-color: var(--booked-border); color: var(--booked-text); }

  /* ── RESPONSIVE ── */
  @media (max-width: 820px) {
    .app {
      grid-template-columns: 1fr;
      grid-template-areas: "header" "dates" "floor" "bookings";
      gap: 0;
      padding: 20px 16px 60px;
    }
    .bookings-col { margin-top: 20px; max-height: 400px; }
    .header-name { width: 160px; }
  }
  @media (max-width: 520px) {
    .app { padding: 16px 12px 48px; }
    .room-wrap { padding: 14px; border-radius: 18px; }
    .seats-row { gap: 8px; }
    .seat-num { font-size: 18px; }
    .seat-sub { font-size: 10px; }
    .date-chip { width: 46px; }
    .header-logo { width: 34px; height: 34px; font-size: 15px; border-radius: 10px; }
    .legend { gap: 10px; padding: 8px 12px; }
  }
</style>
</head>
<body>

<!-- ANIMATED BACKGROUND -->
<div class="bg-orbs">
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
</div>

<div class="app">

  <!-- HEADER -->
  <header>
    <div class="header-left">
      <div class="header-logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="position:relative;z-index:1"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      </div>
      <div class="header-titles">
        <h1>Бронирование <span>рабочих мест</span></h1>
        <div class="header-sub">Выберите дату и место</div>
      </div>
    </div>
    <div class="header-right">
      <input class="header-name" id="userName" type="text" placeholder="Ваше имя" />
      <button class="theme-btn" id="themeBtn" title="Сменить тему">
        <span class="theme-icon moon">🌙</span>
        <span class="theme-icon sun">☀️</span>
      </button>
    </div>
  </header>

  <!-- DATES -->
  <div class="date-nav">
    <div class="shift-hint-icon">
      <span class="shift-hint-trigger">?</span>
      <div class="shift-hint-popup">Shift + клик — выбрать несколько дат</div>
    </div>
    <button id="prevWeek">&#8249;</button>
    <div class="date-strip" id="dateStrip"></div>
    <button class="date-nav-btn" id="nextWeek">&#8250;</button>
    <div class="date-nav-controls">
      <span class="multisel-badge hidden" id="multiselBadge"></span>
      <button class="multisel-clear hidden" id="multiselClear">Сбросить</button>
      <button class="date-nav-btn today-btn" id="todayBtn">Сегодня</button>
    </div>
  </div>

  <!-- FLOOR PLAN -->
  <div class="floor-col">
    <div class="room-wrap">
      <div class="room-inner">
        <div class="zone">
          <div class="seats-row cols3" id="gridA"></div>
        </div>
        <div class="zone">
          <div class="seats-row cols3" id="gridB"></div>
        </div>
      </div>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot free"></div>Свободно</div>
      <div class="legend-item"><div class="legend-dot booked"></div>Занято</div>
      <div class="legend-item"><div class="legend-dot mine"></div>Моё</div>
      <div class="legend-item"><div class="legend-dot blocked"></div>Недоступно</div>
    </div>
  </div>

  <!-- BOOKINGS SIDEBAR -->
  <div class="bookings-col">
    <div class="bookings-head">
      <span class="bookings-head-title">Бронирования</span>
      <div class="bookings-filter">
        <button class="filter-btn" data-filter="all">Все</button>
        <button class="filter-btn active" data-filter="week">Неделя</button>
        <button class="filter-btn" data-filter="mine">Мои</button>
      </div>
    </div>
    <div class="bookings-body" id="bookingsBody"></div>
  </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Место 00</h2>
    <p class="sub" id="modalSub"></p>
    <div class="modal-dates" id="modalDates"></div>
    <div class="info-row" id="modalOwnerRow"><span>Занято</span><span id="modalOwner">—</span></div>
    <div class="modal-btns" id="modalBtns"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── CONFIG ───────────────────────────────────────────────────────────────────
  const BLOCKED = [14, 15];
  const ZONE_A  = [19, 20, 21];
  const ZONE_B  = [16, 17, 18, 13, 14, 15];
  const WD_FULL  = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
  const WD_SHORT = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
  const MONTHS      = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
  const MONTHS_FULL = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

  // ── STATE ────────────────────────────────────────────────────────────────────
  function todayStr() { return new Date().toISOString().slice(0, 10); }

  function loadBookings() {
    try { return JSON.parse(localStorage.getItem('ws_bookings3') || '{}'); }
    catch { return {}; }
  }
  function save() {
    try { localStorage.setItem('ws_bookings3', JSON.stringify(state.bookings)); }
    catch (e) { console.warn('localStorage write failed', e); }
  }

  const state = {
    bookings:      loadBookings(),
    userName:      '',
    selectedDate:  todayStr(),
    selectedDates: new Set([todayStr()]),
    weekOffset:    0,
    bFilter:       'week',
    collapsed:     {},
    theme:         localStorage.getItem('ws_theme') || 'light',
  };

  // ── THEME ────────────────────────────────────────────────────────────────────
  const html = document.documentElement;
  html.setAttribute('data-theme', state.theme);
  document.getElementById('themeBtn').onclick = () => {
    state.theme = state.theme === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', state.theme);
    try { localStorage.setItem('ws_theme', state.theme); } catch {}
  };

  // ── HELPERS ──────────────────────────────────────────────────────────────────
  function isWeekend(dateStr) {
    const dow = new Date(dateStr).getDay();
    return dow === 0 || dow === 6;
  }

  function getWeekMonday(offset = 0) {
    const base = new Date();
    base.setDate(base.getDate() + offset * 7);
    const dow = base.getDay();
    const monday = new Date(base);
    monday.setDate(base.getDate() - (dow === 0 ? 6 : dow - 1));
    return monday;
  }

  function getVisibleWeekDays() {
    const monday = getWeekMonday(state.weekOffset);
    return Array.from({ length: 7 }, (_, i) => {
      const d = new Date(monday);
      d.setDate(monday.getDate() + i);
      return d.toISOString().slice(0, 10);
    });
  }

  function getState(seat, date) {
    date = date || state.selectedDate;
    if (BLOCKED.includes(seat)) return 'blocked';
    const owner = state.bookings[date]?.[seat];
    if (!owner) return 'free';
    const me = state.userName;
    if (me && owner.toLowerCase() === me.toLowerCase()) return 'mine';
    return 'booked';
  }

  function fmtDate(str) {
    const [y, m, d] = str.split('-');
    return `${+d} ${MONTHS[+m-1]} ${y}`;
  }
  function fmtDateShort(str) {
    const [, m, d] = str.split('-');
    const dt = new Date(str);
    return `${WD_FULL[dt.getDay()]}, ${+d} ${MONTHS[+m-1]}`;
  }

  // ── RENDER DATES ─────────────────────────────────────────────────────────────
  function renderDates() {
    const strip = document.getElementById('dateStrip');
    strip.innerHTML = '';
    const monday = getWeekMonday(state.weekOffset);

    for (let i = 0; i < 7; i++) {
      const d = new Date(monday);
      d.setDate(monday.getDate() + i);
      const str = d.toISOString().slice(0, 10);
      const dow = d.getDay();
      const isWknd = dow === 0 || dow === 6;
      const isPrimary = str === state.selectedDate;
      const isSelected = state.selectedDates.has(str);

      const chip = document.createElement('div');
      let cls = 'date-chip';
      if (isPrimary)       cls += ' active';
      else if (isSelected) cls += ' selected';
      if (isWknd)          cls += ' weekend';
      chip.className = cls;
      chip.innerHTML = `<div class="wd">${WD_SHORT[dow]}</div><div class="d">${d.getDate()}</div>`;

      if (!isWknd) {
        chip.onclick = (e) => {
          e.preventDefault();
          if (e.shiftKey) window.getSelection()?.removeAllRanges();
          if (e.shiftKey) {
            if (state.selectedDates.has(str)) {
              state.selectedDates.delete(str);
              if (str === state.selectedDate) {
                const remaining = [...state.selectedDates].sort();
                state.selectedDate = remaining.length > 0
                  ? remaining[remaining.length - 1]
                  : str;
                state.selectedDates.add(state.selectedDate);
              }
            } else {
              state.selectedDates.add(str);
              state.selectedDate = str;
            }
            state.selectedDates.add(state.selectedDate);
          } else {
            if (str === state.selectedDate && state.selectedDates.size > 1) {
              state.selectedDates.delete(str);
              const remaining = [...state.selectedDates].sort();
              state.selectedDate = remaining[remaining.length - 1];
              state.selectedDates.add(state.selectedDate);
            } else {
              state.selectedDate = str;
              state.selectedDates = new Set([str]);
            }
          }
          render();
        };
      }
      strip.appendChild(chip);
    }

    const badge = document.getElementById('multiselBadge');
    const clear  = document.getElementById('multiselClear');
    const n = state.selectedDates.size;
    if (n > 1) {
      badge.textContent = `${n} дня`;
      badge.classList.remove('hidden');
      clear.classList.remove('hidden');
    } else {
      badge.classList.add('hidden');
      clear.classList.add('hidden');
    }
  }

  // ── RENDER SEATS ─────────────────────────────────────────────────────────────
  function makeSeat(seat) {
    if (BLOCKED.includes(seat)) {
      const el = document.createElement('div');
      el.className = 'seat blocked';
      el.innerHTML = `<div class="dot"></div><div class="seat-num">${seat}</div><div class="seat-sub">—</div>`;
      return el;
    }

    const days = getVisibleWeekDays();
    const selInWeek = [...state.selectedDates].filter(d => days.includes(d));
    const activeDays = selInWeek.length > 0 ? selInWeek : days.filter(d => !isWeekend(d));
    const activeStates = activeDays.map(d => getState(seat, d));
    const hasMine   = activeStates.includes('mine');
    const hasBooked = activeStates.includes('booked');
    const displayState = hasMine && !hasBooked ? 'mine' : hasBooked ? 'booked' : 'free';

    let sub = '';
    if (displayState === 'booked') {
      const bd = activeDays.find(d => getState(seat, d) === 'booked');
      sub = `<div class="seat-sub">${state.bookings[bd]?.[seat] || ''}</div>`;
    } else if (displayState === 'mine') {
      const md = activeDays.find(d => getState(seat, d) === 'mine');
      sub = `<div class="seat-sub">${state.bookings[md]?.[seat] || 'моё'}</div>`;
    } else {
      sub = `<div class="seat-sub" style="opacity:.3">своб.</div>`;
    }

    const segs = days.map(d => {
      const dow = new Date(d).getDay();
      const s = (dow === 0 || dow === 6) ? 'weekend' : getState(seat, d);
      const h = state.selectedDates.has(d) ? ' style="height:7px"' : '';
      return `<div class="seat-week-day s-${s}"${h}></div>`;
    }).join('');

    const monthStr = MONTHS_FULL[+days[0].split('-')[1] - 1];
    const el = document.createElement('div');
    el.className = `seat ${displayState}`;
    el.innerHTML = `<div class="dot"></div><div class="seat-month">${monthStr}</div><div class="seat-num">${seat}</div>${sub}<div class="seat-week">${segs}</div>`;

    if (displayState === 'free' || displayState === 'mine') {
      el.onclick = () => openModal(seat, getState(seat, state.selectedDate));
    }
    return el;
  }

  function renderSeats() {
    const gA = document.getElementById('gridA');
    const gB = document.getElementById('gridB');
    gA.innerHTML = ''; gB.innerHTML = '';
    ZONE_A.forEach(s => gA.appendChild(makeSeat(s)));
    ZONE_B.forEach(s => gB.appendChild(makeSeat(s)));
  }

  // ── RENDER BOOKINGS ──────────────────────────────────────────────────────────
  function getFilteredDates() {
    const me = state.userName.toLowerCase();
    let dates = Object.keys(state.bookings)
      .filter(d => Object.keys(state.bookings[d] || {}).length > 0)
      .sort();

    if (state.bFilter === 'week') {
      const monday = getWeekMonday(state.weekOffset);
      monday.setHours(0, 0, 0, 0);
      const friday = new Date(monday);
      friday.setDate(monday.getDate() + 4);
      friday.setHours(23, 59, 59, 999);
      dates = dates.filter(d => { const dt = new Date(d); return dt >= monday && dt <= friday; });
    }

    if (state.bFilter === 'mine') {
      dates = dates.filter(d =>
        Object.values(state.bookings[d] || {}).some(n => n.toLowerCase() === me)
      );
    }

    return dates;
  }

  function renderBookings() {
    const body = document.getElementById('bookingsBody');
    const me   = state.userName.toLowerCase();
    const dates = getFilteredDates();

    if (dates.length === 0) {
      body.innerHTML = `<div class="b-empty"><div class="b-empty-icon">📅</div>${state.bFilter === 'mine' && !me ? 'Введите имя, чтобы<br>увидеть свои брони' : 'Нет бронирований'}</div>`;
      return;
    }

    body.innerHTML = '';
    const today = todayStr();

    dates.forEach(dateStr => {
      const entries = Object.entries(state.bookings[dateStr] || []);
      const filtered = state.bFilter === 'mine'
        ? entries.filter(([, name]) => name.toLowerCase() === me)
        : entries;
      if (!filtered.length) return;

      const isCollapsed = state.collapsed[dateStr];
      const group = document.createElement('div');
      group.className = 'b-day-group';

      const hdr = document.createElement('div');
      hdr.className = 'b-day-header' + (isCollapsed ? ' collapsed' : '');
      const label = dateStr === today ? '⚡ Сегодня'
        : dateStr === state.selectedDate ? '▸ ' + fmtDateShort(dateStr)
        : fmtDateShort(dateStr);
      hdr.innerHTML = `<span class="b-day-label">${label}</span><span class="b-day-right"><span class="b-day-count">${filtered.length}</span><span class="b-chevron">▾</span></span>`;
      hdr.onclick = () => { state.collapsed[dateStr] = !state.collapsed[dateStr]; renderBookings(); };

      const items = document.createElement('div');
      items.className = 'b-day-items' + (isCollapsed ? ' hidden' : '');

      filtered.sort(([a], [b]) => +a - +b).forEach(([seat, name]) => {
        const isMine = name.toLowerCase() === me;
        const row = document.createElement('div');
        row.className = 'b-row' + (isMine ? ' is-mine' : '');
        row.innerHTML = `
          <div class="b-seat-badge">${seat}</div>
          <div class="b-info">
            <div class="b-name">${name}</div>
            <div class="b-time">${dateStr === today ? 'сегодня' : fmtDateShort(dateStr).split(', ')[1] || ''}</div>
          </div>
          ${isMine ? `<button class="b-cancel-btn" title="Отменить">✕</button>` : ''}`;
        if (isMine) {
          row.querySelector('.b-cancel-btn').onclick = (e) => {
            e.stopPropagation();
            doCancel(+seat, dateStr, false);
          };
        }
        items.appendChild(row);
      });

      group.appendChild(hdr);
      group.appendChild(items);
      body.appendChild(group);
    });
  }

  function render() {
    renderDates();
    renderSeats();
    renderBookings();
  }

  // ── EVENT BINDINGS ───────────────────────────────────────────────────────────
  document.getElementById('userName').addEventListener('input', (e) => {
    state.userName = e.target.value.trim();
    render();
  });

  document.getElementById('prevWeek').onclick = () => {
    state.weekOffset--;
    const monday = getWeekMonday(state.weekOffset);
    state.selectedDate = monday.toISOString().slice(0, 10);
    state.selectedDates = new Set([state.selectedDate]);
    render();
  };
  document.getElementById('nextWeek').onclick = () => {
    state.weekOffset++;
    const monday = getWeekMonday(state.weekOffset);
    state.selectedDate = monday.toISOString().slice(0, 10);
    state.selectedDates = new Set([state.selectedDate]);
    render();
  };
  document.getElementById('todayBtn').onclick = () => {
    state.weekOffset = 0;
    state.selectedDate = todayStr();
    state.selectedDates = new Set([todayStr()]);
    render();
  };
  document.getElementById('multiselClear').onclick = () => {
    state.selectedDates = new Set([state.selectedDate]);
    render();
  };

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.bFilter = btn.dataset.filter;
      renderBookings();
    };
  });

  // ── MODAL ────────────────────────────────────────────────────────────────────
  function renderModalDates(dates) {
    const isSingle = dates.length === 1;
    document.getElementById('modalDates').innerHTML = dates.map(d =>
      `<span class="modal-date-chip${isSingle ? ' single' : ''}">${fmtDate(d)}</span>`
    ).join('');
  }

  function openModal(seat, seatState) {
    const datesList = [...state.selectedDates].sort();
    document.getElementById('modalTitle').textContent = `Место ${seat}`;
    const ownerRow = document.getElementById('modalOwnerRow');
    const btns = document.getElementById('modalBtns');

    if (seatState === 'mine') {
      const mineDates = datesList.filter(d => getState(seat, d) === 'mine');
      document.getElementById('modalSub').textContent =
        mineDates.length > 1 ? `Забронировано на ${mineDates.length} дня` : 'Вы забронировали это место';
      renderModalDates(mineDates);
      ownerRow.style.display = 'flex';
      document.getElementById('modalOwner').textContent = state.bookings[mineDates[0]]?.[seat] || '—';
      btns.innerHTML = `<button class="btn btn-danger" id="cancelBtn">Отменить ${mineDates.length > 1 ? 'все' : 'бронь'}</button><button class="btn btn-cancel" id="closeBtn">Закрыть</button>`;
      document.getElementById('cancelBtn').onclick = () => {
        mineDates.forEach(d => doCancel(seat, d, true));
        render();
        showToast(`Бронь места ${seat} отменена`, 'cancel');
        closeModal();
      };
      document.getElementById('closeBtn').onclick = closeModal;
    } else {
      const freeDates = datesList.filter(d => getState(seat, d) === 'free');
      document.getElementById('modalSub').textContent =
        freeDates.length > 1 ? `Забронировать на ${freeDates.length} дня?` : 'Забронировать на день?';
      renderModalDates(freeDates);
      ownerRow.style.display = 'none';
      btns.innerHTML = `<button class="btn btn-primary" id="bookBtn">Забронировать</button><button class="btn btn-cancel" id="closeBtn">Отмена</button>`;
      document.getElementById('bookBtn').onclick = () => { doBook(seat, freeDates); closeModal(); };
      document.getElementById('closeBtn').onclick = closeModal;
    }
    document.getElementById('modalOverlay').classList.add('show');
  }

  function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
  document.getElementById('modalOverlay').onclick = e => { if (e.target === e.currentTarget) closeModal(); };

  // ── ACTIONS ──────────────────────────────────────────────────────────────────
  function doBook(seat, dates) {
    if (!state.userName) { showToast('Введите ваше имя', 'cancel'); return; }
    dates = (dates || [state.selectedDate]).filter(d => !isWeekend(d));
    dates.forEach(d => {
      if (!state.bookings[d]) state.bookings[d] = {};
      state.bookings[d][seat] = state.userName;
    });
    save(); render();
    showToast(dates.length > 1 ? `✓ Место ${seat} забронировано на ${dates.length} дня` : `✓ Место ${seat} забронировано`, 'success');
  }

  function doCancel(seat, date, silent) {
    date = date || state.selectedDate;
    if (state.bookings[date]) {
      delete state.bookings[date][seat];
      if (!Object.keys(state.bookings[date]).length) delete state.bookings[date];
      save();
    }
    if (!silent) { render(); showToast(`Бронь места ${seat} отменена`, 'cancel'); }
  }

  // ── TOAST ────────────────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ── INIT ─────────────────────────────────────────────────────────────────────
  render();
</script>
</body>
</html>
