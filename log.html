<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Лог действий</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;700&family=Onest:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13; --surface: #17171e; --surface2: #1e1e28; --border: #2a2a38;
    --accent: #6c63ff; --accent2: #ff6584; --text: #e8e8f0; --muted: #6b6b80;
    --book: #1a2a1a; --book-border: #2d4a2d; --book-text: #7ec87e;
    --cancel: #2a1a1a; --cancel-border: #4a2d2d; --cancel-text: #c87e7e;
    --shadow: 0 2px 20px rgba(0,0,0,0.45);
  }
  [data-theme="light"] {
    --bg: #f0f0f5; --surface: #ffffff; --surface2: #f5f5fa; --border: #dddde8;
    --accent: #5a52e8; --accent2: #e84f6a; --text: #1a1a2e; --muted: #8888a0;
    --book: #edf8ed; --book-border: #b8ddb8; --book-text: #2e7a2e;
    --cancel: #fdf0f0; --cancel-border: #e8bbbb; --cancel-text: #9a2e2e;
    --shadow: 0 2px 16px rgba(0,0,0,0.08);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Onest', sans-serif;
    min-height: 100vh;
  }
  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 40px; height: 68px;
    display: flex; align-items: center; gap: 16px;
    position: sticky; top: 0; z-index: 10;
    box-shadow: var(--shadow);
  }
  .back-link {
    font-family: 'Unbounded', sans-serif; font-size: 11px; font-weight: 600;
    letter-spacing: 0.12em; color: var(--muted); text-decoration: none;
    border: 1px solid var(--border); border-radius: 7px; padding: 5px 10px;
    transition: all 0.15s; flex-shrink: 0;
  }
  .back-link:hover { color: var(--accent); border-color: var(--accent); }
  h1 { font-family: 'Unbounded', sans-serif; font-size: 18px; font-weight: 700; }
  h1 span { color: var(--accent); }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .total-badge {
    font-size: 11px; font-family: 'Onest', sans-serif; color: var(--muted);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 4px 10px;
  }

  /* ── FILTERS BAR ── */
  .filters {
    padding: 16px 40px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    border-bottom: 1px solid var(--border); background: var(--surface);
    position: sticky; top: 68px; z-index: 9;
  }
  .search-wrap {
    position: relative; flex: 1; min-width: 200px; max-width: 320px;
  }
  .search-icon {
    position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
    font-size: 13px; color: var(--muted); pointer-events: none;
  }
  .search-input {
    width: 100%; padding: 8px 12px 8px 32px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 9px; color: var(--text);
    font-family: 'Onest', sans-serif; font-size: 13px; outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }

  .filter-group { display: flex; gap: 4px; }
  .f-btn {
    padding: 6px 12px; border-radius: 8px; font-size: 12px;
    font-family: 'Onest', sans-serif; font-weight: 500;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--muted); cursor: pointer; transition: all 0.15s;
  }
  .f-btn:hover { border-color: var(--accent); color: var(--accent); }
  .f-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .f-btn.book-active  { background: var(--book);   border-color: var(--book-border);   color: var(--book-text); }
  .f-btn.cancel-active { background: var(--cancel); border-color: var(--cancel-border); color: var(--cancel-text); }

  .date-filter {
    padding: 6px 10px; border-radius: 8px; font-size: 12px;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text); font-family: 'Onest', sans-serif; outline: none;
    transition: border-color 0.2s; cursor: pointer;
  }
  .date-filter:focus { border-color: var(--accent); }

  .clear-btn {
    padding: 6px 12px; border-radius: 8px; font-size: 12px;
    font-family: 'Onest', sans-serif; font-weight: 500;
    border: 1px solid var(--border); background: transparent;
    color: var(--muted); cursor: pointer; transition: all 0.15s;
  }
  .clear-btn:hover { color: var(--accent2); border-color: var(--accent2); }

  /* ── LOG TABLE ── */
  .log-wrap {
    padding: 24px 40px;
    max-width: 1400px;
  }
  .log-table {
    width: 100%; border-collapse: collapse;
  }
  .log-table th {
    text-align: left; font-family: 'Unbounded', sans-serif;
    font-size: 9px; font-weight: 600; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--muted);
    padding: 0 12px 10px; border-bottom: 1px solid var(--border);
    white-space: nowrap; cursor: pointer; user-select: none;
  }
  .log-table th:hover { color: var(--accent); }
  .sort-arrow { margin-left: 4px; opacity: 0.5; font-size: 10px; }
  .log-table td {
    padding: 10px 12px; border-bottom: 1px solid var(--border);
    font-size: 13px; vertical-align: middle;
  }
  .log-table tr:last-child td { border-bottom: none; }
  .log-table tr:hover td { background: var(--surface2); }

  .action-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 9px; border-radius: 6px; font-size: 11px; font-weight: 500;
    border: 1px solid;
  }
  .action-badge.book   { background: var(--book);   border-color: var(--book-border);   color: var(--book-text); }
  .action-badge.cancel { background: var(--cancel); border-color: var(--cancel-border); color: var(--cancel-text); }

  .seat-num {
    font-family: 'Unbounded', sans-serif; font-size: 12px; font-weight: 600;
    display: inline-block; width: 32px; height: 32px; line-height: 32px;
    text-align: center; border-radius: 8px;
    background: var(--surface2); border: 1px solid var(--border);
  }
  .user-name { font-weight: 500; }
  .date-cell { color: var(--muted); font-size: 12px; }
  .time-cell { color: var(--muted); font-size: 11px; white-space: nowrap; }

  /* empty */
  .empty {
    text-align: center; padding: 80px 20px;
    color: var(--muted); font-size: 13px; line-height: 1.8;
  }
  .empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.4; }

  /* spinner */
  .spinner {
    text-align: center; padding: 80px;
    color: var(--muted); font-size: 12px;
  }
</style>
</head>
<body>

<header>
  <a href="booking_56.html" class="back-link">← назад</a>
  <h1>Лог <span>действий</span></h1>
  <div class="header-right">
    <span class="total-badge" id="totalBadge">— записей</span>
  </div>
</header>

<div class="filters">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="searchInput" type="text" placeholder="Поиск по имени...">
  </div>

  <div class="filter-group" id="actionFilter">
    <button class="f-btn active" data-action="">Все</button>
    <button class="f-btn" data-action="book">Бронь</button>
    <button class="f-btn" data-action="cancel">Отмена</button>
  </div>

  <input class="date-filter" type="date" id="dateFrom" title="С даты">
  <input class="date-filter" type="date" id="dateTo" title="По дату">

  <button class="clear-btn" id="clearBtn">Сбросить</button>
</div>

<div class="log-wrap">
  <div class="spinner" id="spinner">Загрузка...</div>
  <table class="log-table" id="logTable" style="display:none">
    <thead>
      <tr>
        <th data-col="action">Действие <span class="sort-arrow"></span></th>
        <th data-col="seat">Место <span class="sort-arrow"></span></th>
        <th data-col="user_name">Пользователь <span class="sort-arrow"></span></th>
        <th data-col="date">Дата брони <span class="sort-arrow"></span></th>
        <th data-col="created_at">Время записи <span class="sort-arrow"></span></th>
      </tr>
    </thead>
    <tbody id="logBody"></tbody>
  </table>
  <div class="empty" id="emptyState" style="display:none">
    <div class="empty-icon">📋</div>
    Записей не найдено
  </div>
</div>

<script>
  const PB = '/pb';

  // ── THEME ──
  document.documentElement.setAttribute('data-theme', localStorage.getItem('ws_theme') || 'light');

  // ── STATE ──
  let allLogs = [];
  let sortCol = 'created_at';
  let sortDir = -1; // -1 = desc, 1 = asc

  const filters = {
    search: '',
    action: '',
    dateFrom: '',
    dateTo: '',
  };

  // ── FETCH ──
  async function loadLogs() {
    try {
      let page = 1, items = [];
      while (true) {
        const r = await fetch(`${PB}/api/collections/logs/records?perPage=500&page=${page}&sort=-created_at`);
        if (!r.ok) throw new Error(r.status);
        const d = await r.json();
        items = items.concat(d.items || []);
        if (items.length >= (d.totalItems || 0) || (d.items || []).length === 0) break;
        page++;
      }
      allLogs = items;
    } catch(e) {
      document.getElementById('spinner').textContent = 'Ошибка загрузки. Проверьте соединение.';
      return;
    }
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('logTable').style.display = 'table';
    applyAndRender();
  }

  // ── FILTER + SORT ──
  function applyAndRender() {
    let rows = allLogs.filter(r => {
      if (filters.action && r.action !== filters.action) return false;
      if (filters.search && !r.user_name.toLowerCase().includes(filters.search.toLowerCase())) return false;
      if (filters.dateFrom && r.date < filters.dateFrom) return false;
      if (filters.dateTo   && r.date > filters.dateTo)   return false;
      return true;
    });

    rows.sort((a, b) => {
      let va = a[sortCol] ?? '';
      let vb = b[sortCol] ?? '';
      if (sortCol === 'seat') { va = +va; vb = +vb; }
      if (va < vb) return -sortDir;
      if (va > vb) return  sortDir;
      return 0;
    });

    document.getElementById('totalBadge').textContent = `${rows.length} записей`;

    const body = document.getElementById('logBody');
    const empty = document.getElementById('emptyState');

    if (rows.length === 0) {
      body.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    body.innerHTML = rows.map(r => {
      const isBook = r.action === 'book';
      const created = r.created_at ? new Date(r.created_at) : null;
      const timeStr = created
        ? created.toLocaleString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' })
        : '—';
      const [y, m, d] = r.date.split('-');
      const dateStr = `${+d}.${m}.${y}`;
      return `<tr>
        <td><span class="action-badge ${r.action}">${isBook ? '✓ Бронь' : '✕ Отмена'}</span></td>
        <td><span class="seat-num">${+r.seat}</span></td>
        <td><span class="user-name">${escHtml(r.user_name)}</span></td>
        <td class="date-cell">${escHtml(dateStr)}</td>
        <td class="time-cell">${escHtml(timeStr)}</td>
      </tr>`;
    }).join('');

    updateSortArrows();
  }

  function escHtml(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── SORT HEADERS ──
  function updateSortArrows() {
    document.querySelectorAll('.log-table th').forEach(th => {
      const arrow = th.querySelector('.sort-arrow');
      if (th.dataset.col === sortCol) {
        arrow.textContent = sortDir === -1 ? ' ↓' : ' ↑';
        arrow.style.opacity = '1';
      } else {
        arrow.textContent = '';
        arrow.style.opacity = '0.5';
      }
    });
  }

  document.querySelectorAll('.log-table th[data-col]').forEach(th => {
    th.onclick = () => {
      if (sortCol === th.dataset.col) {
        sortDir *= -1;
      } else {
        sortCol = th.dataset.col;
        sortDir = sortCol === 'created' ? -1 : 1;
      }
      applyAndRender();
    };
  });

  // ── FILTER BINDINGS ──
  document.getElementById('searchInput').addEventListener('input', e => {
    filters.search = e.target.value;
    applyAndRender();
  });

  document.getElementById('actionFilter').addEventListener('click', e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    filters.action = btn.dataset.action;
    document.querySelectorAll('#actionFilter .f-btn').forEach(b => {
      b.className = 'f-btn';
      if (b === btn) {
        if (!filters.action) b.classList.add('active');
        else if (filters.action === 'book')   b.classList.add('book-active');
        else b.classList.add('cancel-active');
      }
    });
    applyAndRender();
  });

  document.getElementById('dateFrom').addEventListener('change', e => {
    filters.dateFrom = e.target.value;
    applyAndRender();
  });

  document.getElementById('dateTo').addEventListener('change', e => {
    filters.dateTo = e.target.value;
    applyAndRender();
  });

  document.getElementById('clearBtn').onclick = () => {
    filters.search = ''; filters.action = ''; filters.dateFrom = ''; filters.dateTo = '';
    document.getElementById('searchInput').value = '';
    document.getElementById('dateFrom').value = '';
    document.getElementById('dateTo').value = '';
    document.querySelectorAll('#actionFilter .f-btn').forEach((b, i) => {
      b.className = 'f-btn' + (i === 0 ? ' active' : '');
    });
    applyAndRender();
  };

  loadLogs();
</script>
</body>
</html>
