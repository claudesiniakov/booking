<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Бронирование мест</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;700&family=Onest:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #17171e;
    --surface2: #1e1e28;
    --border: #2a2a38;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --free: #1a2a1a; --free-border: #2d4a2d; --free-text: #7ec87e;
    --booked: #2a1a1a; --booked-border: #4a2d2d; --booked-text: #c87e7e;
    --blocked: #161616; --blocked-border: #242424; --blocked-text: #3a3a3a;
    --mine: #1a1a2e; --mine-border: #4a4a8a; --mine-text: #9090e0;
    --zone-bg: #13131a; --zone-border: #222230;
    --shadow: 0 2px 20px rgba(0,0,0,0.45);
    --glow-free: rgba(126,200,126,0.12); --glow-mine: rgba(108,99,255,0.18);
    --bg-grad1: rgba(108,99,255,0.07); --bg-grad2: rgba(255,101,132,0.05);
  }
  [data-theme="light"] {
    --bg: #f0f0f5; --surface: #ffffff; --surface2: #f5f5fa; --border: #dddde8;
    --accent: #5a52e8; --accent2: #e84f6a; --text: #1a1a2e; --muted: #8888a0;
    --free: #edf8ed; --free-border: #b8ddb8; --free-text: #2e7a2e;
    --booked: #fdf0f0; --booked-border: #e8bbbb; --booked-text: #9a2e2e;
    --blocked: #f0f0f0; --blocked-border: #d8d8d8; --blocked-text: #b8b8b8;
    --mine: #eeeeff; --mine-border: #b0b0e0; --mine-text: #4040a0;
    --zone-bg: #f7f7fc; --zone-border: #e4e4ef;
    --shadow: 0 2px 16px rgba(0,0,0,0.08);
    --glow-free: rgba(46,122,46,0.08); --glow-mine: rgba(90,82,232,0.1);
    --bg-grad1: rgba(90,82,232,0.04); --bg-grad2: rgba(232,79,106,0.03);
  }
  [data-theme="fallout"] {
    --bg: #060a04; --surface: #0c1108; --surface2: #141f0e; --border: #1f3314;
    --accent: #4af626; --accent2: #c8f040; --text: #a8e060; --muted: #4a7a28;
    --free: #0a1a06; --free-border: #1a3a10; --free-text: #4af626;
    --booked: #1a1400; --booked-border: #2a2800; --booked-text: #c8f040;
    --blocked: #080a06; --blocked-border: #141a10; --blocked-text: #2a4a18;
    --mine: #0a0a1a; --mine-border: #1a1a38; --mine-text: #7af040;
    --zone-bg: #080c06; --zone-border: #141f0e;
    --shadow: 0 2px 20px rgba(0,0,0,0.7);
    --glow-free: rgba(74,246,38,0.15); --glow-mine: rgba(122,240,64,0.18);
    --bg-grad1: rgba(74,246,38,0.05); --bg-grad2: rgba(200,240,64,0.03);
  }
  [data-theme="dark"] {
    --bg: #0f0f13; --surface: #17171e; --surface2: #1e1e28; --border: #2a2a38;
    --accent: #6c63ff; --accent2: #ff6584; --text: #e8e8f0; --muted: #6b6b80;
    --free: #1a2a1a; --free-border: #2d4a2d; --free-text: #7ec87e;
    --booked: #2a1a1a; --booked-border: #4a2d2d; --booked-text: #c87e7e;
    --blocked: #161616; --blocked-border: #242424; --blocked-text: #3a3a3a;
    --mine: #1a1a2e; --mine-border: #4a4a8a; --mine-text: #9090e0;
    --zone-bg: #13131a; --zone-border: #222230;
    --shadow: 0 2px 20px rgba(0,0,0,0.45);
    --glow-free: rgba(126,200,126,0.12); --glow-mine: rgba(108,99,255,0.18);
    --bg-grad1: rgba(108,99,255,0.07); --bg-grad2: rgba(255,101,132,0.05);
  }
  [data-theme="monokai"] {
    --bg: #1a1b16; --surface: #23241e; --surface2: #2d2e26; --border: #3a3c30;
    --accent: #a6e22e; --accent2: #f92672; --text: #f8f8f2; --muted: #75715e;
    --free: #1e2f0e; --free-border: #3a5a1a; --free-text: #a6e22e;
    --booked: #2f0e14; --booked-border: #5a1a2a; --booked-text: #f92672;
    --blocked: #1a1a14; --blocked-border: #2d2e26; --blocked-text: #5c5a4f;
    --mine: #1a1020; --mine-border: #3a1050; --mine-text: #ae81ff;
    --zone-bg: #16170e; --zone-border: #2d2e26;
    --shadow: 0 2px 20px rgba(0,0,0,0.5);
    --glow-free: rgba(166,226,46,0.12); --glow-mine: rgba(174,129,255,0.18);
    --bg-grad1: rgba(166,226,46,0.05); --bg-grad2: rgba(249,38,114,0.04);
  }
  [data-theme="nord"] {
    --bg: #242933; --surface: #2e3440; --surface2: #3b4252; --border: #434c5e;
    --accent: #88c0d0; --accent2: #bf616a; --text: #eceff4; --muted: #9099a8;
    --free: #1f2e1f; --free-border: #3a5a3a; --free-text: #a3be8c;
    --booked: #2e1f1f; --booked-border: #5a3a3a; --booked-text: #bf616a;
    --blocked: #2a2e38; --blocked-border: #3b4252; --blocked-text: #616e88;
    --mine: #1f2a38; --mine-border: #3a4a60; --mine-text: #81a1c1;
    --zone-bg: #1e2430; --zone-border: #3b4252;
    --shadow: 0 2px 20px rgba(0,0,0,0.4);
    --glow-free: rgba(163,190,140,0.12); --glow-mine: rgba(136,192,208,0.18);
    --bg-grad1: rgba(136,192,208,0.06); --bg-grad2: rgba(191,97,106,0.04);
  }
  [data-theme="github"] {
    --bg: #f6f8fa; --surface: #ffffff; --surface2: #f0f2f5; --border: #d0d7de;
    --accent: #0969da; --accent2: #cf222e; --text: #24292f; --muted: #656d76;
    --free: #dafbe1; --free-border: #a8e6b8; --free-text: #1a7f37;
    --booked: #ffebe9; --booked-border: #f0b0b0; --booked-text: #cf222e;
    --blocked: #f0f0f0; --blocked-border: #d8d8d8; --blocked-text: #b8b8b8;
    --mine: #dbeafe; --mine-border: #b0c8f0; --mine-text: #0550ae;
    --zone-bg: #f6f8fa; --zone-border: #e4e9ef;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --glow-free: rgba(26,127,55,0.08); --glow-mine: rgba(9,105,218,0.1);
    --bg-grad1: rgba(9,105,218,0.03); --bg-grad2: rgba(207,34,46,0.02);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Onest', sans-serif;
    height: 100vh; overflow: hidden;
    display: flex; flex-direction: column;
    transition: background 0.3s, color 0.3s;
  }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 15%, var(--bg-grad1) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 80% 85%, var(--bg-grad2) 0%, transparent 60%);
    transition: background 0.3s;
  }

  /* ── LAYOUT ── */
  .app {
    position: relative; z-index: 1;
    flex: 1; min-height: 0;
    padding: 16px 28px 16px;
    display: grid;
    grid-template-columns: 1fr 240px;
    grid-template-rows: auto 1fr;
    grid-template-areas:
      "dates   dates"
      "floor   bookings";
    gap: 0 20px;
    align-items: stretch;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    height: 68px;
    display: flex; align-items: center; gap: 20px;
    flex-shrink: 0; position: relative; z-index: 10;
    transition: background 0.3s, border-color 0.3s;
  }
  .logo {
    display: flex; align-items: center; gap: 8px;
    white-space: nowrap; flex-shrink: 0;
  }
  .logo-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 6px var(--accent);
    animation: hpulse 2s ease-in-out infinite; flex-shrink: 0;
  }
  @keyframes hpulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; line-height: 1; white-space: nowrap; flex-shrink: 0; }
  h1 span { color: var(--accent); }
  .header-name {
    flex: 1; max-width: 280px;
    background: transparent; border: 1px solid var(--border);
    color: var(--text); padding: 8px 14px; border-radius: 9px;
    font-family: 'Onest', sans-serif; font-size: 14px; outline: none;
    transition: border-color 0.2s;
  }
  .header-name:focus { border-color: var(--accent); }
  .header-name::placeholder { color: var(--muted); }

  /* ── HEADER RIGHT ── */
  .header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; margin-left: auto; }
  .log-link {
    font-family: 'Unbounded', sans-serif; font-size: 11px; font-weight: 600;
    letter-spacing: 0.12em; color: var(--muted); text-decoration: none;
    border: 1px solid var(--border); border-radius: 7px; padding: 5px 10px;
    transition: all 0.15s;
  }
  .log-link:hover { color: var(--accent); border-color: var(--accent); }

  /* ── THEME PICKER ── */
  .theme-picker { position: relative; }
  .theme-picker-btn {
    display: flex; align-items: center; gap: 7px;
    background: transparent; border: 1px solid var(--border);
    border-radius: 7px; padding: 5px 10px;
    color: var(--muted); font-family: 'Onest', sans-serif; font-size: 12px;
    cursor: pointer; transition: all 0.15s; outline: none;
  }
  .theme-picker-btn:hover,
  .theme-picker-btn.open { border-color: var(--accent); color: var(--text); }
  .tp-chevron { font-size: 8px; transition: transform 0.2s; }
  .theme-picker-btn.open .tp-chevron { transform: rotate(180deg); }
  .theme-dropdown {
    position: absolute; top: calc(100% + 6px); right: 0;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 6px; z-index: 999;
    min-width: 180px; box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    display: flex; flex-direction: column; gap: 3px;
    opacity: 0; pointer-events: none; transform: translateY(-6px);
    transition: opacity 0.15s, transform 0.15s;
  }
  .theme-dropdown.open { opacity: 1; pointer-events: all; transform: translateY(0); }
  .theme-option {
    display: flex; align-items: center; gap: 10px; padding: 7px 8px;
    border-radius: 7px; border: 1px solid transparent;
    cursor: pointer; transition: background 0.1s, border-color 0.1s;
  }
  .theme-option:hover { background: var(--surface2); border-color: var(--border); }
  .theme-option.active { background: var(--surface2); border-color: var(--accent); }
  .to-preview { width: 38px; height: 24px; border-radius: 5px; overflow: hidden; position: relative; flex-shrink: 0; }
  .to-name { font-size: 12px; font-weight: 600; color: var(--text); flex: 1; }
  .to-desc { font-size: 10px; color: var(--muted); }
  .to-check { font-size: 12px; color: var(--accent); opacity: 0; flex-shrink: 0; }
  .theme-option.active .to-check { opacity: 1; }

  /* ── DATE ROW ── */
  .date-row {
    grid-area: dates;
    display: flex; align-items: stretch; gap: 12px;
    margin-bottom: 12px;
  }
  .date-nav {
    flex: 1; position: relative;
    display: flex; align-items: center; gap: 10px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 18px; padding: 12px 18px;
    box-shadow: var(--shadow); transition: background 0.3s, border-color 0.3s;
  }
  .date-nav > button,
  .date-nav-btn {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); width: 40px; height: 40px; flex-shrink: 0;
    border-radius: 10px; cursor: pointer; font-size: 17px; transition: all 0.2s;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .date-nav > button:hover,
  .date-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .today-btn {
    width: auto; padding: 0 12px;
    font-size: 11px; font-family: 'Onest', sans-serif; font-weight: 500;
  }
  .date-strip { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; min-width: 0; align-items: center; user-select: none; }
  .date-strip::-webkit-scrollbar { display: none; }
  .date-nav-controls {
    display: flex; align-items: center; gap: 8px; flex-shrink: 0; margin-left: auto;
  }
  .multisel-badge {
    flex-shrink: 0; background: var(--accent); color: #fff;
    border-radius: 10px; height: 40px; padding: 0 14px;
    font-size: 12px; font-weight: 600; font-family: 'Onest', sans-serif;
    white-space: nowrap; line-height: 40px; display: block;
  }
  .multisel-badge.hidden { display: none !important; }
  .multisel-clear {
    flex-shrink: 0; display: block;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--muted); border-radius: 10px;
    height: 40px; padding: 0 14px; line-height: 40px;
    font-size: 12px; cursor: pointer; font-family: 'Onest', sans-serif;
    transition: all 0.2s; white-space: nowrap;
  }
  .multisel-clear:hover { border-color: var(--accent2); color: var(--accent2); }
  .multisel-clear.hidden { display: none !important; }
  /* shift tooltip */
  .date-nav:hover::after { opacity: 1; }
  /* shift hint icon */
  .shift-hint-icon {
    position: relative; display: flex; align-items: center;
  }
  .shift-hint-trigger {
    width: 24px; height: 24px; border-radius: 7px;
    background: var(--text); border: 1px solid var(--text);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: var(--bg); cursor: default;
    transition: all 0.2s; user-select: none; font-weight: 600;
  }
  .shift-hint-icon:hover .shift-hint-trigger {
    background: var(--accent); border-color: var(--accent); color: #fff;
  }
  .shift-hint-popup {
    position: absolute; bottom: calc(100% + 8px); left: 0;
    background: var(--text); color: var(--bg);
    font-size: 11px; font-family: 'Onest', sans-serif; font-weight: 500;
    padding: 6px 12px; border-radius: 9px; white-space: nowrap;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
    z-index: 50;
  }
  .shift-hint-popup::after {
    content: ''; position: absolute; top: 100%; left: 8px;
    border: 5px solid transparent;
    border-top-color: var(--text);
  }
  .shift-hint-icon:hover .shift-hint-popup { opacity: 1; }

  .date-chip {
    flex-shrink: 0; width: 62px; padding: 9px 0; border-radius: 11px;
    background: var(--surface2); border: 1px solid var(--border);
    cursor: pointer; text-align: center; transition: all 0.2s;
    user-select: none;
  }
  .date-chip .wd { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
  .date-chip .d { font-size: 18px; font-weight: 600; font-family: 'Unbounded', sans-serif; }
  .date-chip:hover:not(.weekend) { border-color: var(--accent); }
  /* primary selected date */
  .date-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .date-chip.active .wd { color: rgba(255,255,255,0.65); }
  /* additional selected dates — full fill */
  .date-chip.selected {
    background: var(--accent); border-color: var(--accent);
    color: #fff; opacity: 0.65;
  }
  .date-chip.selected .wd { color: rgba(255,255,255,0.7); }
  .date-chip:not(.weekend) { cursor: pointer; }
  .date-chip:not(.weekend):not(.active)::after {
    content: attr(data-hint);
    display: none;
  }
  .date-chip.weekend { opacity: 0.45; cursor: not-allowed; border-style: dashed; }
  .date-chip.weekend .wd { color: var(--muted); }
  .date-chip.weekend .d  { color: var(--muted); }
  .date-chip.past { opacity: 0.35; cursor: not-allowed; }
  .date-chip.past .wd { color: var(--muted); }
  .date-chip.past .d  { color: var(--muted); text-decoration: line-through; }


  /* ── ZONE NAV (inline in date-nav) ── */
  .zone-nav {
    display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 18px; padding: 12px 14px;
    box-shadow: var(--shadow); transition: background 0.3s, border-color 0.3s;
  }
  .zone-nav-arrow {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); width: 34px; height: 34px; flex-shrink: 0;
    border-radius: 8px; cursor: pointer; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; user-select: none;
  }
  .zone-nav-arrow:hover { border-color: var(--accent); color: var(--accent); }
  .zone-nav-center {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    min-width: 140px;
  }
  .zone-nav-label {
    font-size: 9px; font-family: 'Onest', sans-serif; font-weight: 500;
    letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted);
  }
  .zone-nav-name {
    font-family: 'Unbounded', sans-serif; font-size: 12px; font-weight: 600;
    color: var(--text); letter-spacing: -0.2px;
    transition: opacity 0.2s, transform 0.2s;
  }
  .zone-nav-name.switching { opacity: 0; transform: translateY(5px); }
  .zone-nav-dots { display: flex; gap: 5px; align-items: center; }
  .zone-nav-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--border); transition: all 0.2s;
  }
  .zone-nav-dot.active { background: var(--accent); transform: scale(1.3); }

  /* ── FLOOR PLAN ── */
  .floor-col { grid-area: floor; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }

  /* zone slider */
  .zone-slider { overflow: hidden; flex: 1; min-height: 0; }
  .zone-slides-track {
    display: flex; height: 100%;
    transition: transform 0.45s cubic-bezier(.4,0,.2,1);
  }
  .zone-slide {
    min-width: 100%; flex-shrink: 0;
    height: 100%; display: flex; flex-direction: column;
  }

  .room-wrap {
    display: flex; gap: 0; position: relative;
    background: var(--zone-bg); border: 1px solid var(--zone-border);
    border-radius: 26px; padding: 24px 24px 24px 24px;
    box-shadow: var(--shadow); transition: background 0.3s, border-color 0.3s;
    flex: 1; min-height: 0;
  }

  /* weekend overlay */
  .room-wrap.weekend-mode::after {
    content: '🚫 Выходной день — бронирование недоступно';
    position: absolute; inset: 0; z-index: 10;
    background: rgba(15,15,19,0.72);
    backdrop-filter: blur(4px);
    border-radius: 22px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 500; color: var(--muted);
    letter-spacing: 0.02em;
    pointer-events: all;
  }
  [data-theme="light"] .room-wrap.weekend-mode::after {
    background: rgba(240,240,245,0.78);
  }
  /* windows strip — left side */
  .windows-strip {
    display: flex; flex-direction: column; align-items: center;
    gap: 6px; padding: 6px 0; width: 28px; flex-shrink: 0;
  }
  .windows-label {
    font-size: 8px; font-family: 'Onest', sans-serif; font-weight: 500;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted);
    writing-mode: vertical-rl; transform: rotate(180deg);
    margin-bottom: 4px; opacity: 0.7;
  }
  .windows-panes { display: flex; flex-direction: column; gap: 5px; flex: 1; }
  .window-pane {
    flex: 1; width: 20px; border-radius: 4px;
    border: 1px solid var(--border);
    background: linear-gradient(90deg, var(--bg-grad1), transparent);
    position: relative; overflow: hidden; min-height: 28px;
  }
  .window-pane::after {
    content: ''; position: absolute;
    inset: 2px; border-radius: 2px;
    border: 1px solid var(--border);
    opacity: 0.5;
  }

  .room-inner { flex: 1; display: flex; flex-direction: column; gap: 12px; min-height: 0; overflow: hidden; }

  .zone-label {
    font-size: 9px; font-family: 'Onest', sans-serif; font-weight: 500;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted);
    padding: 0 2px; margin-bottom: 2px;
  }

  .zone {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 18px; padding: 18px 20px 16px;
    transition: background 0.3s, border-color 0.3s;
    flex: 1; min-height: 0; display: flex; flex-direction: column;
  }
  .room-inner > .zone:nth-child(3) { flex: 2; }

  /* вагончики */
  .zone-slide:last-child {
    display: flex; flex-direction: column; align-items: center;
    padding-top: 4px; gap: 10px; overflow: auto;
  }
  .wagon-wrap {
    display: flex; gap: 0; position: relative;
    width: 800px; flex-shrink: 0;
    background: var(--zone-bg); border: 1px solid var(--zone-border);
    border-radius: 26px; padding: 24px 22px;
    box-shadow: var(--shadow); transition: background 0.3s, border-color 0.3s;
  }
  .wagon-wall {
    margin: -24px -22px 14px;
    height: 24px; border-radius: 26px 26px 0 0;
    border-bottom: 1px solid var(--zone-border);
    background:
      repeating-linear-gradient(
        -45deg,
        transparent 0, transparent 5px,
        var(--border) 5px, var(--border) 6px
      );
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; flex-shrink: 0;
  }
  .wagon-wall-label {
    font-size: 8px; font-family: 'Onest', sans-serif;
    letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--muted); opacity: 0.7;
    background: var(--zone-bg); padding: 0 10px;
    position: relative;
  }
  .wagon-inner { flex: 1; display: flex; flex-direction: column; gap: 10px; }
  .wagon-zones-row { display: flex; gap: 14px; }
  .wagon-zones-row .zone { flex: 1; }
  .wagon-pairs .seat-pair .seat .seat-week-day { width: 12px; }
  .wagon-title {
    font-size: 9px; font-family: 'Onest', sans-serif; font-weight: 500;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted);
  }
  .wagon-zone-label {
    font-size: 9px; font-family: 'Onest', sans-serif; font-weight: 500;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted);
    padding: 2px 2px 0; opacity: 0.6;
  }
  .seats-row.cols2 { grid-template-columns: repeat(2, 1fr); }

  .seats-row { display: grid; gap: 14px; flex: 1; grid-auto-rows: 1fr; }
  .seats-row.cols3 { grid-template-columns: repeat(3, 1fr); }

  /* wagon seats — paired column */
  .wagon-pairs { display: flex; flex-direction: column; gap: 14px; }
  .seat-pair { display: flex; gap: 4px; }
  .seat-pair .seat { flex: 1; aspect-ratio: 2/3; border-radius: 11px; }
  .seat-pair .seat:first-child { border-radius: 9px 4px 4px 9px; }
  .seat-pair .seat:last-child  { border-radius: 4px 9px 9px 4px; }

  /* ── SEAT ── */
  .seat {
    border-radius: 11px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.22s cubic-bezier(.4,0,.2,1);
    position: relative; user-select: none; border: 1.5px solid; gap: 3px;
  }
  .seat-num { font-family: 'Unbounded', sans-serif; font-size: 28px; font-weight: 600; line-height: 1; }
  .seat-sub { font-size: 13px; font-weight: 500; text-align: center; padding: 0 4px; letter-spacing: 0.02em; line-height: 1.3; }
  .seat-month {
    position: absolute; top: 8px; left: 10px;
    font-size: 9px; font-family: 'Onest', sans-serif; font-weight: 500;
    letter-spacing: 0.02em; opacity: 0.55;
  }

  /* week bar */
  .seat-week {
    display: flex; gap: 3px; align-items: center;
    position: absolute; bottom: 7px; left: 50%; transform: translateX(-50%);
  }
  .seat-week-day {
    width: 22px; height: 6px; border-radius: 3px;
    transition: opacity 0.2s;
  }
  .seat-week-day.s-free    { background: #4caf6e; opacity: 1; }
  .seat-week-day.s-mine    { background: var(--accent); opacity: 1; }
  .seat-week-day.s-booked  { background: var(--accent2); opacity: 1; }
  .seat-week-day.s-blocked { background: var(--border); opacity: 0.6; }
  .seat-week-day.s-weekend { background: #000; opacity: 0.15; }
  [data-theme="dark"] .seat-week-day.s-weekend { background: #fff; opacity: 0.15; }

  .seat.free    { background: var(--free);    border-color: var(--free-border);    color: var(--free-text); }
  .seat.booked  { background: var(--booked);  border-color: var(--booked-border);  color: var(--booked-text); cursor: default; }
  .seat.mine    { background: var(--mine);    border-color: var(--mine-border);    color: var(--mine-text); }
  .seat.blocked { background: var(--blocked); border-color: var(--blocked-border); color: var(--blocked-text); cursor: not-allowed; opacity: 0.45; }

  .seat.free:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 8px 20px var(--glow-free); border-color: var(--free-text); }
  .seat.mine:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 6px 18px var(--glow-mine); border-color: var(--mine-text); }

  .seat .dot { width: 5px; height: 5px; border-radius: 50%; position: absolute; top: 8px; right: 8px; }
  .seat.free .dot    { background: var(--free-text); }
  .seat.booked .dot  { background: var(--booked-text); }
  .seat.mine .dot    { background: var(--mine-text); animation: pulse 2s infinite; }
  .seat.blocked .dot { background: var(--blocked-text); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

  /* cabinet */


  /* legend */
  .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
  .legend-item { display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--muted); }
  .legend-dot { width: 9px; height: 9px; border-radius: 3px; border: 1.5px solid; }
  .legend-dot.free    { background: var(--free);    border-color: var(--free-border); }
  .legend-dot.booked  { background: var(--booked);  border-color: var(--booked-border); }
  .legend-dot.mine    { background: var(--mine);    border-color: var(--mine-border); }
  .legend-dot.blocked { background: var(--blocked); border-color: var(--blocked-border); }

  /* ────────────────────────────────────────────────
     BOOKINGS SIDEBAR
  ──────────────────────────────────────────────── */
  .bookings-col {
    grid-area: bookings;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 0;
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: background 0.3s, border-color 0.3s;
    display: flex; flex-direction: column;
    align-self: stretch;
    min-height: 0;
  }

  .bookings-head {
    padding: 12px 14px 10px;
    border-bottom: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 8px;
    flex-shrink: 0;
  }
  .bookings-head-title {
    font-family: 'Unbounded', sans-serif; font-size: 9px;
    letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase;
  }
  .bookings-filter {
    display: flex; gap: 3px;
  }
  .filter-btn {
    flex: 1; padding: 4px 0; border-radius: 7px; font-size: 10px; font-family: 'Onest', sans-serif;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--muted); cursor: pointer; transition: all 0.18s; text-align: center;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .bookings-body {
    flex: 1; overflow-y: auto; padding: 8px 10px 12px;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  .bookings-body::-webkit-scrollbar { width: 3px; }
  .bookings-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* empty state */
  .b-empty {
    text-align: center; padding: 28px 10px;
    color: var(--muted); font-size: 11px; line-height: 1.6;
  }
  .b-empty-icon { font-size: 24px; margin-bottom: 8px; opacity: 0.4; }

  /* day group */
  .b-day-group { margin-bottom: 10px; }
  .b-day-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 5px 8px; border-radius: 8px;
    background: var(--surface2); border: 1px solid var(--border);
    cursor: pointer; user-select: none; transition: all 0.18s;
    margin-bottom: 5px;

  .b-day-header:hover { border-color: var(--accent); }
  .b-day-header.collapsed { margin-bottom: 0; }
  .b-day-label {
    font-family: 'Unbounded', sans-serif; font-size: 9px;

  }
  .b-day-right { display: flex; align-items: center; gap: 5px; }

    background: var(--accent); color: #fff;

  .b-day-count.empty { background: var(--surface); border: 1px solid var(--border); color: var(--muted); }

  }

  .b-day-items { display: flex; flex-direction: column; gap: 4px; overflow: hidden; }

  /* booking row */
  .b-row {
    display: flex; align-items: center; gap: 6px;

  .b-info { flex: 1; min-width: 0; }
  .b-name { font-size: 11px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .b-row.is-mine .b-name { color: var(--mine-text); }
  .b-time { font-size: 9px; color: var(--muted); margin-top: 1px; }

  .b-cancel-btn {
    flex-shrink: 0; width: 20px; height: 20px; border-radius: 5px;
    border: 1px solid var(--mine-border); background: transparent;
    color: var(--mine-text); cursor: pointer; font-size: 11px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.18s; opacity: 0.5;
  }
  .b-cancel-btn:hover { opacity: 1; background: var(--booked); border-color: var(--booked-border); color: var(--booked-text); }

  .modal-dates {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-bottom: 14px;
  }
  .modal-date-chip {
    padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 500;
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    font-family: 'Onest', sans-serif;
  }
  .modal-date-chip.single {
    font-size: 13px; padding: 5px 12px;
  }
  .modal-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.55); backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  .modal-overlay.show { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 22px; padding: 28px; width: 100%; max-width: 340px;
    transform: translateY(18px) scale(0.97);
    transition: transform 0.3s cubic-bezier(.4,0,.2,1), background 0.3s;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .modal-overlay.show .modal { transform: none; }
  .modal h2 { font-family: 'Unbounded', sans-serif; font-size: 17px; margin-bottom: 5px; }
  .modal .sub { font-size: 12px; color: var(--muted); margin-bottom: 20px; }
  .modal .info-row { display: flex; justify-content: space-between; margin-bottom: 9px; font-size: 13px; }
  .modal .info-row span:first-child { color: var(--muted); }
  .modal .info-row span:last-child { font-weight: 500; }
  .modal-btns { display: flex; gap: 9px; margin-top: 20px; }
  .btn { flex: 1; padding: 11px; border-radius: 11px; border: none; font-family: 'Onest', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { filter: brightness(1.15); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(108,99,255,0.35); }
  .btn-danger { background: rgba(255,101,132,0.12); color: var(--accent2); border: 1px solid rgba(255,101,132,0.3); }
  .btn-danger:hover { background: rgba(255,101,132,0.22); }
  .btn-cancel { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .btn-cancel:hover { color: var(--text); border-color: var(--muted); }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(70px);
    background: var(--surface2); border: 1px solid var(--border);
    padding: 11px 22px; border-radius: 13px; font-size: 12px; font-weight: 500;
    transition: transform 0.38s cubic-bezier(.4,0,.2,1);
    z-index: 200; white-space: nowrap; box-shadow: 0 8px 28px rgba(0,0,0,0.3);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--free-border); color: var(--free-text); }
  .toast.cancel  { border-color: var(--booked-border); color: var(--booked-text); }

  /* ── MIN WIDTH ── */
  body { min-width: 1200px; }
</style>
</head>
<body>

<script>
  // ── CONFIG ───────────────────────────────────────────────────────────────────
  const BLOCKED = [14, 15];
  const ZONE_A  = [19, 20, 21];
  const ZONE_B  = [16, 17, 18, 13, 14, 15];
  const ZONE_C  = [1, 2, 3, 4];
  const WD_FULL  = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
  const WD_SHORT = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
  const MONTHS      = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
  const MONTHS_FULL = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

  // ── POCKETBASE CLIENT ────────────────────────────────────────────────────────
  const PB = '/pb';

  const pbApi = {
    async list() {
      const r = await fetch(`${PB}/api/collections/bookings/records?perPage=2000&sort=date`);
      const d = await r.json();
      return d.items || [];
    },
    async create(date, seat, user_name) {
      const r = await fetch(`${PB}/api/collections/bookings/records`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({date, seat, user_name})
      });
      if (r.ok) pbApi.log('book', user_name, seat, date);
      return r;
    },
    async findAndDelete(date, seat) {
      const filter = encodeURIComponent(`date='${date}'&&seat=${seat}`);
      const r = await fetch(`${PB}/api/collections/bookings/records?filter=${filter}`);
      const d = await r.json();
      for (const rec of (d.items || [])) {
        await fetch(`${PB}/api/collections/bookings/records/${rec.id}`, { method: 'DELETE' });
        pbApi.log('cancel', rec.user_name, seat, date);
      }
    },
    log(action, user_name, seat, date) {
      fetch(`${PB}/api/collections/logs/records`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({action, user_name, seat: +seat, date})
      }).catch(() => {});
    }
  };

  function recordsToState(records) {
    const b = {};
    for (const r of records) {
      if (!b[r.date]) b[r.date] = {};
      b[r.date][r.seat] = r.user_name;
    }
    return b;
  }

  function subscribeRT() {
    let es, clientId;
    function connect() {
      es = new EventSource(`${PB}/api/realtime`);
      es.addEventListener('PB_CONNECT', e => {
        clientId = JSON.parse(e.data).clientId;
        fetch(`${PB}/api/realtime`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ clientId, subscriptions: ['bookings'] })
        });
      });
      es.addEventListener('bookings', e => {
        const { action, record: r } = JSON.parse(e.data);
        if (action === 'create') {
          if (!state.bookings[r.date]) state.bookings[r.date] = {};
          state.bookings[r.date][r.seat] = r.user_name;
        } else if (action === 'delete') {
          if (state.bookings[r.date]) {
            delete state.bookings[r.date][r.seat];
            if (!Object.keys(state.bookings[r.date]).length) delete state.bookings[r.date];
          }
        }
        render();
      });
      es.onerror = () => { es.close(); setTimeout(connect, 5000); };
    }
    connect();
  }

  // ── UTILS ────────────────────────────────────────────────────────────────────
  function escapeHtml(s) {
    return String(s ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── STATE ────────────────────────────────────────────────────────────────────
  function todayStr() { return new Date().toISOString().slice(0, 10); }

  const state = {
    bookings:      {},
    userName:      localStorage.getItem('ws_user') || '',
    selectedDate:  todayStr(),
    selectedDates: new Set([todayStr()]),
    weekOffset:    0,
    bFilter:       'week',
    collapsed:     {},
    theme:         localStorage.getItem('ws_theme') || 'light',
    activeZone:    0,
  };

  // ── THEME ────────────────────────────────────────────────────────────────────
  const html = document.documentElement;
  html.setAttribute('data-theme', state.theme);

  const THEMES = [
    { id: 'light',   name: 'Light',   desc: 'Светлая тема',    bg: '#f0f0f5', key: '#5a52e8', str: '#2e7a2e', num: '#d97706' },
    { id: 'fallout', name: 'Fallout', desc: 'Терминал Убежища', bg: '#060a04', key: '#4af626', str: '#a8e060', num: '#7af040' },
    { id: 'dark',    name: 'Dark',    desc: 'Тёмная ночь',     bg: '#0f0f13', key: '#6c63ff', str: '#7ec87e', num: '#ff6584' },
    { id: 'monokai', name: 'Monokai', desc: 'Классика кода',   bg: '#1a1b16', key: '#a6e22e', str: '#e6db74', num: '#ae81ff' },
    { id: 'nord',    name: 'Nord',    desc: 'Северное сияние', bg: '#242933', key: '#88c0d0', str: '#a3be8c', num: '#b48ead' },
    { id: 'github',  name: 'GitHub',  desc: 'GitHub Light',    bg: '#f6f8fa', key: '#0969da', str: '#1a7f37', num: '#953800' },
  ];

  const themeDropdown  = document.getElementById('themeDropdown');
  const themePickerBtn = document.getElementById('themePickerBtn');
  const tpSwatch       = document.getElementById('tpSwatch');
  const tpLabel        = document.getElementById('tpLabel');

  function buildSwatchHTML(t) {
    return `<span style="display:flex;width:20px;height:20px;border-radius:4px;overflow:hidden;position:relative;background:${t.bg};">
      <span style="position:absolute;top:4px;left:4px;display:flex;flex-direction:column;gap:2px;">
        <span style="width:11px;height:2px;border-radius:1px;background:${t.key};"></span>
        <span style="width:8px;height:2px;border-radius:1px;background:${t.str};"></span>
        <span style="width:6px;height:2px;border-radius:1px;background:${t.num};"></span>
      </span>
    </span>`;
  }

  function updateActiveSwatch() {
    const t = THEMES.find(t => t.id === state.theme) || THEMES[0];
    tpSwatch.innerHTML = buildSwatchHTML(t);
    tpLabel.textContent = t.name;
    themeDropdown.querySelectorAll('.theme-option').forEach(el =>
      el.classList.toggle('active', el.dataset.theme === state.theme));
  }

  THEMES.forEach(t => {
    const opt = document.createElement('div');
    opt.className = 'theme-option';
    opt.dataset.theme = t.id;
    opt.innerHTML = `
      <div class="to-preview" style="background:${t.bg};">
        <span style="position:absolute;top:5px;left:6px;display:flex;flex-direction:column;gap:3px;">
          <span style="width:20px;height:2px;border-radius:1px;background:${t.key};"></span>
          <span style="width:14px;height:2px;border-radius:1px;background:${t.str};"></span>
          <span style="width:10px;height:2px;border-radius:1px;background:${t.num};"></span>
        </span>
      </div>
      <div><div class="to-name">${t.name}</div><div class="to-desc">${t.desc}</div></div>
      <span class="to-check">✓</span>
    `;
    opt.addEventListener('click', () => {
      state.theme = t.id;
      html.setAttribute('data-theme', state.theme);
      try { localStorage.setItem('ws_theme', state.theme); } catch {}
      updateActiveSwatch();
      closeThemePicker();
    });
    themeDropdown.appendChild(opt);
  });

  function closeThemePicker() {
    themeDropdown.classList.remove('open');
    themePickerBtn.classList.remove('open');
  }

  themePickerBtn.addEventListener('click', e => {
    e.stopPropagation();
    const isOpen = themeDropdown.classList.toggle('open');
    themePickerBtn.classList.toggle('open', isOpen);
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.theme-picker')) closeThemePicker();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeThemePicker();
  });

  updateActiveSwatch();

  // ── HELPERS ──────────────────────────────────────────────────────────────────
  function isWeekend(dateStr) {
    const dow = new Date(dateStr).getDay();
    return dow === 0 || dow === 6;
  }

  function getWeekMonday(offset = 0) {
    const base = new Date();
    base.setDate(base.getDate() + offset * 7);
    const dow = base.getDay();
    const monday = new Date(base);
    monday.setDate(base.getDate() - (dow === 0 ? 6 : dow - 1));
    return monday;
  }

  function getVisibleWeekDays() {
    const monday = getWeekMonday(state.weekOffset);
    return Array.from({ length: 7 }, (_, i) => {
      const d = new Date(monday);
      d.setDate(monday.getDate() + i);
      return d.toISOString().slice(0, 10);
    });
  }

  // 1. getState reads from state.userName, not DOM
  function getState(seat, date) {
    date = date || state.selectedDate;
    if (BLOCKED.includes(seat)) return 'blocked';
    const owner = state.bookings[date]?.[seat];
    if (!owner) return 'free';
    const me = state.userName;
    if (me && owner.toLowerCase() === me.toLowerCase()) return 'mine';
    return 'booked';
  }

  function fmtDate(str) {
    const [y, m, d] = str.split('-');
    return `${+d} ${MONTHS[+m-1]} ${y}`;
  }
  function fmtDateShort(str) {
    const [, m, d] = str.split('-');
    const dt = new Date(str);
    return `${WD_FULL[dt.getDay()]}, ${+d} ${MONTHS[+m-1]}`;
  }

  // ── RENDER DATES ─────────────────────────────────────────────────────────────
  function renderDates() {
    const strip = document.getElementById('dateStrip');
    strip.innerHTML = '';
    const monday = getWeekMonday(state.weekOffset);

    for (let i = 0; i < 7; i++) {
      const d = new Date(monday);
      d.setDate(monday.getDate() + i);
      const str = d.toISOString().slice(0, 10);
      const dow = d.getDay();
      const isWknd = dow === 0 || dow === 6;
      const isPrimary = str === state.selectedDate;
      const isSelected = state.selectedDates.has(str);

      const isPast = str < todayStr();
      const chip = document.createElement('div');
      let cls = 'date-chip';
      if (isPrimary)       cls += ' active';
      else if (isSelected) cls += ' selected';
      if (isWknd)          cls += ' weekend';
      else if (isPast)     cls += ' past';
      chip.className = cls;
      chip.innerHTML = `<div class="wd">${WD_SHORT[dow]}</div><div class="d">${d.getDate()}</div>`;

      if (!isWknd && !isPast) {
        chip.onclick = (e) => {
          e.preventDefault();
          if (e.shiftKey) window.getSelection()?.removeAllRanges();
          if (e.shiftKey) {
            if (state.selectedDates.has(str)) {
              state.selectedDates.delete(str);
              if (str === state.selectedDate) {
                const remaining = [...state.selectedDates].sort();
                state.selectedDate = remaining.length > 0
                  ? remaining[remaining.length - 1]
                  : str;
                state.selectedDates.add(state.selectedDate);
              }
            } else {
              state.selectedDates.add(str);
              state.selectedDate = str;
            }
            state.selectedDates.add(state.selectedDate);
          } else {
            if (str === state.selectedDate && state.selectedDates.size > 1) {
              state.selectedDates.delete(str);
              const remaining = [...state.selectedDates].sort();
              state.selectedDate = remaining[remaining.length - 1];
              state.selectedDates.add(state.selectedDate);
            } else {
              state.selectedDate = str;
              state.selectedDates = new Set([str]);
            }
          }
          render();
        };
      }
      strip.appendChild(chip);
    }

    // multisel UI
    const badge = document.getElementById('multiselBadge');
    const clear  = document.getElementById('multiselClear');
    const n = state.selectedDates.size;
    if (n > 1) {
      badge.textContent = `${n} дня`;
      badge.classList.remove('hidden');
      clear.classList.remove('hidden');
    } else {
      badge.classList.add('hidden');
      clear.classList.add('hidden');
    }
  }

  // ── RENDER SEATS ─────────────────────────────────────────────────────────────
  function makeSeat(seat) {
    const el = document.createElement('div');
    el.dataset.seat = seat;

    if (BLOCKED.includes(seat)) {
      el.className = 'seat blocked';
      el.innerHTML = `<div class="dot"></div><div class="seat-num">${seat}</div><div class="seat-sub">—</div>`;
      return el;
    }

    const days = getVisibleWeekDays();
    const selInWeek = [...state.selectedDates].filter(d => days.includes(d));
    const activeDays = selInWeek.length > 0 ? selInWeek : days.filter(d => !isWeekend(d));
    const activeStates = activeDays.map(d => getState(seat, d));
    const hasMine   = activeStates.includes('mine');
    const hasBooked = activeStates.includes('booked');
    const displayState = hasMine && !hasBooked ? 'mine' : hasBooked ? 'booked' : 'free';

    const monthStr = MONTHS_FULL[+state.selectedDate.split('-')[1] - 1];
    const segs = days.map(d => {
      const dow = new Date(d).getDay();
      const s = (dow === 0 || dow === 6) ? 'weekend' : getState(seat, d);
      const h = state.selectedDates.has(d) ? ' style="height:7px"' : '';
      return `<div class="seat-week-day s-${s}"${h}></div>`;
    }).join('');

    el.className = `seat ${displayState}`;
    el.innerHTML = `<div class="dot"></div><div class="seat-month">${escapeHtml(monthStr)}</div><div class="seat-num">${seat}</div><div class="seat-sub"></div><div class="seat-week">${segs}</div>`;

    const subEl = el.querySelector('.seat-sub');
    if (displayState === 'booked') {
      const bd = activeDays.find(d => getState(seat, d) === 'booked');
      subEl.textContent = state.bookings[bd]?.[seat] || '';
    } else if (displayState === 'mine') {
      const md = activeDays.find(d => getState(seat, d) === 'mine');
      subEl.textContent = state.bookings[md]?.[seat] || 'моё';
    } else {
      subEl.textContent = 'своб.';
      subEl.style.opacity = '0.3';
    }

    return el;
  }

  function renderSeats() {
    const gA  = document.getElementById('gridA');
    const gB  = document.getElementById('gridB');
    const gC1 = document.getElementById('gridC1');
    const gC2 = document.getElementById('gridC2');
    gA.innerHTML = ''; gB.innerHTML = ''; gC1.innerHTML = ''; gC2.innerHTML = '';
    ZONE_A.forEach(s => gA.appendChild(makeSeat(s)));
    ZONE_B.forEach(s => gB.appendChild(makeSeat(s)));
    const makePair = (a, b, target) => {
      const pair = document.createElement('div');
      pair.className = 'seat-pair';
      pair.appendChild(makeSeat(a));
      pair.appendChild(makeSeat(b));
      target.appendChild(pair);
    };
    makePair(1, 2, gC1);
    makePair(3, 4, gC2);
  }

  // ── RENDER BOOKINGS ──────────────────────────────────────────────────────────
  function getFilteredDates() {
    const me = state.userName.toLowerCase();
    const today = todayStr();
    let dates = Object.keys(state.bookings)
      .filter(d => d >= today && Object.keys(state.bookings[d] || {}).length > 0)
      .sort();

    if (state.bFilter === 'week') {
      const monday = getWeekMonday(state.weekOffset);
      monday.setHours(0, 0, 0, 0);
      const friday = new Date(monday);
      friday.setDate(monday.getDate() + 4);
      friday.setHours(23, 59, 59, 999);
      dates = dates.filter(d => { const dt = new Date(d); return dt >= monday && dt <= friday; });
    }

    if (state.bFilter === 'mine') {
      dates = dates.filter(d =>
        Object.values(state.bookings[d] || {}).some(n => n.toLowerCase() === me)
      );
    }

    return dates;
  }

  function renderBookings() {
    const body = document.getElementById('bookingsBody');
    const me   = state.userName.toLowerCase();
    const dates = getFilteredDates();

    if (dates.length === 0) {
      body.innerHTML = `<div class="b-empty"><div class="b-empty-icon">📅</div>${state.bFilter === 'mine' && !me ? 'Введите имя, чтобы<br>увидеть свои брони' : 'Нет бронирований'}</div>`;
      return;
    }

    body.innerHTML = '';
    const today = todayStr();

    dates.forEach(dateStr => {
      const entries = Object.entries(state.bookings[dateStr] || []);
      const filtered = state.bFilter === 'mine'
        ? entries.filter(([, name]) => name.toLowerCase() === me)
        : entries;
      if (!filtered.length) return;

      const isCollapsed = state.collapsed[dateStr];
      const group = document.createElement('div');
      group.className = 'b-day-group';

      const hdr = document.createElement('div');
      hdr.className = 'b-day-header' + (isCollapsed ? ' collapsed' : '');
      const label = dateStr === today ? '⚡ Сегодня'
        : dateStr === state.selectedDate ? '▸ ' + fmtDateShort(dateStr)
        : fmtDateShort(dateStr);
      hdr.innerHTML = `<span class="b-day-label">${label}</span><span class="b-day-right"><span class="b-day-count">${filtered.length}</span><span class="b-chevron">▾</span></span>`;
      hdr.onclick = () => { state.collapsed[dateStr] = !state.collapsed[dateStr]; renderBookings(); };

      const items = document.createElement('div');
      items.className = 'b-day-items' + (isCollapsed ? ' hidden' : '');

      filtered.sort(([a], [b]) => +a - +b).forEach(([seat, name]) => {
        const isMine = name.toLowerCase() === me;
        const row = document.createElement('div');
        row.className = 'b-row' + (isMine ? ' is-mine' : '');
        const timeStr = dateStr === today ? 'сегодня' : fmtDateShort(dateStr).split(', ')[1] || '';
        row.innerHTML = `
          <div class="b-seat-badge">${+seat}</div>
          <div class="b-info">
            <div class="b-name"></div>
            <div class="b-time">${escapeHtml(timeStr)}</div>
          </div>
          ${isMine ? `<button class="b-cancel-btn" title="Отменить">✕</button>` : ''}`;
        row.querySelector('.b-name').textContent = name;
        if (isMine) {
          row.querySelector('.b-cancel-btn').onclick = (e) => {
            e.stopPropagation();
            doCancel(+seat, dateStr, false);
          };
        }
        items.appendChild(row);
      });

      group.appendChild(hdr);
      group.appendChild(items);
      body.appendChild(group);
    });
  }

  // 2. Single render() entry point
  function render() {
    renderDates();
    renderSeats();
    renderBookings();
  }

  // ── EVENT BINDINGS ───────────────────────────────────────────────────────────
  // Restore persisted user name
  const userNameEl = document.getElementById('userName');
  userNameEl.value = state.userName;

  // Debounced render for input events
  let _renderTimer;
  function renderDebounced() {
    clearTimeout(_renderTimer);
    _renderTimer = setTimeout(render, 150);
  }

  userNameEl.addEventListener('input', (e) => {
    state.userName = e.target.value.trim();
    try { localStorage.setItem('ws_user', state.userName); } catch {}
    renderDebounced();
  });

  // Delegated seat click on the track
  document.getElementById('zoneTrack').addEventListener('click', (e) => {
    const seatEl = e.target.closest('.seat');
    if (!seatEl || !seatEl.dataset.seat) return;
    const seat = +seatEl.dataset.seat;
    const st = getState(seat, state.selectedDate);
    if (st === 'free' || st === 'mine') openModal(seat, st);
  });

  document.getElementById('prevWeek').onclick = () => {
    state.weekOffset--;
    const monday = getWeekMonday(state.weekOffset);
    state.selectedDate = monday.toISOString().slice(0, 10);
    state.selectedDates = new Set([state.selectedDate]);
    render();
  };
  document.getElementById('nextWeek').onclick = () => {
    state.weekOffset++;
    const monday = getWeekMonday(state.weekOffset);
    state.selectedDate = monday.toISOString().slice(0, 10);
    state.selectedDates = new Set([state.selectedDate]);
    render();
  };
  document.getElementById('todayBtn').onclick = () => {
    state.weekOffset = 0;
    state.selectedDate = todayStr();
    state.selectedDates = new Set([todayStr()]);
    render();
  };
  document.getElementById('multiselClear').onclick = () => {
    state.selectedDates = new Set([state.selectedDate]);
    render();
  };

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.bFilter = btn.dataset.filter;
      renderBookings();
    };
  });

  // ── MODAL ────────────────────────────────────────────────────────────────────
  function renderModalDates(dates) {
    const isSingle = dates.length === 1;
    document.getElementById('modalDates').innerHTML = dates.map(d =>
      `<span class="modal-date-chip${isSingle ? ' single' : ''}">${fmtDate(d)}</span>`
    ).join('');
  }

  function openModal(seat, seatState) {
    const datesList = [...state.selectedDates].sort();
    document.getElementById('modalTitle').textContent = `Место ${seat}`;
    const ownerRow = document.getElementById('modalOwnerRow');
    const btns = document.getElementById('modalBtns');

    if (seatState === 'mine') {
      const mineDates = datesList.filter(d => getState(seat, d) === 'mine');
      document.getElementById('modalSub').textContent =
        mineDates.length > 1 ? `Забронировано на ${mineDates.length} дня` : 'Вы забронировали это место';
      renderModalDates(mineDates);
      ownerRow.style.display = 'flex';
      document.getElementById('modalOwner').textContent = state.bookings[mineDates[0]]?.[seat] || '—';
      btns.innerHTML = `<button class="btn btn-danger" id="cancelBtn">Отменить ${mineDates.length > 1 ? 'все' : 'бронь'}</button><button class="btn btn-cancel" id="closeBtn">Закрыть</button>`;
      document.getElementById('cancelBtn').onclick = async () => {
        await Promise.all(mineDates.map(d => doCancel(seat, d, true)));
        showToast(`Бронь места ${seat} отменена`, 'cancel');
        closeModal();
      };
      document.getElementById('closeBtn').onclick = closeModal;
    } else {
      const freeDates = datesList.filter(d => getState(seat, d) === 'free');
      document.getElementById('modalSub').textContent =
        freeDates.length > 1 ? `Забронировать на ${freeDates.length} дня?` : 'Забронировать на день?';
      renderModalDates(freeDates);
      ownerRow.style.display = 'none';
      btns.innerHTML = `<button class="btn btn-primary" id="bookBtn">Забронировать</button><button class="btn btn-cancel" id="closeBtn">Отмена</button>`;
      document.getElementById('bookBtn').onclick = () => { doBook(seat, freeDates); closeModal(); };
      document.getElementById('closeBtn').onclick = closeModal;
    }
    document.getElementById('modalOverlay').classList.add('show');
  }

  function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
  document.getElementById('modalOverlay').onclick = e => { if (e.target === e.currentTarget) closeModal(); };

  // ── ACTIONS ──────────────────────────────────────────────────────────────────
  function getConflictDates(seat, dates) {
    const me = state.userName.toLowerCase();
    return dates.filter(d => {
      const dayBookings = state.bookings[d] || {};
      return Object.entries(dayBookings).some(
        ([s, name]) => +s !== seat && name.toLowerCase() === me
      );
    });
  }

  async function doBook(seat, dates) {
    if (!state.userName) { showToast('Введите ваше имя', 'cancel'); return; }
    dates = (dates || [state.selectedDate]).filter(d => !isWeekend(d));
    const conflicts = getConflictDates(seat, dates);
    if (conflicts.length) {
      const conflictSeat = Object.entries(state.bookings[conflicts[0]] || {})
        .find(([, name]) => name.toLowerCase() === state.userName.toLowerCase())?.[0];
      showToast(
        conflicts.length === 1
          ? `У вас уже занято место ${conflictSeat} на этот день`
          : `Конфликт: у вас уже есть бронь на ${conflicts.length} из выбранных дат`,
        'cancel'
      );
      return;
    }
    try {
      await Promise.all(dates.map(d => pbApi.create(d, seat, state.userName)));
      showToast(dates.length > 1 ? `✓ Место ${seat} забронировано на ${dates.length} дня` : `✓ Место ${seat} забронировано`, 'success');
    } catch(e) {
      showToast('Ошибка при бронировании', 'cancel');
    }
  }

  async function doCancel(seat, date, silent) {
    date = date || state.selectedDate;
    try {
      await pbApi.findAndDelete(date, seat);
      if (!silent) showToast(`Бронь места ${seat} отменена`, 'cancel');
    } catch(e) {
      if (!silent) showToast('Ошибка при отмене', 'cancel');
    }
  }

  // ── TOAST ────────────────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ── ZONE SLIDER ──────────────────────────────────────────────────────────────
  const ZONES = ['Основная зона', 'Вагончики'];
  function initZoneNav() {
    const dots = document.getElementById('zoneNavDots');
    dots.innerHTML = ZONES.map((_, i) =>
      `<div class="zone-nav-dot${i === 0 ? ' active' : ''}" data-zi="${i}"></div>`
    ).join('');
    dots.querySelectorAll('.zone-nav-dot').forEach(d =>
      d.addEventListener('click', () => goZone(+d.dataset.zi))
    );
  }

  function goZone(idx) {
    state.activeZone = ((idx % ZONES.length) + ZONES.length) % ZONES.length;
    const track = document.getElementById('zoneTrack');
    track.style.transform = `translateX(-${state.activeZone * 100}%)`;

    const nameEl = document.getElementById('zoneNavName');
    nameEl.classList.add('switching');
    setTimeout(() => {
      nameEl.textContent = ZONES[state.activeZone];
      nameEl.classList.remove('switching');
    }, 150);

    document.querySelectorAll('.zone-nav-dot').forEach((d, i) =>
      d.classList.toggle('active', i === state.activeZone)
    );
  }

  document.getElementById('zonePrev').addEventListener('click', () => goZone(state.activeZone - 1));
  document.getElementById('zoneNext').addEventListener('click', () => goZone(state.activeZone + 1));
  initZoneNav();

  // ── INIT ─────────────────────────────────────────────────────────────────────
  pbApi.list().then(records => {
    state.bookings = recordsToState(records);
    subscribeRT();
    render();
  }).catch(() => {
    // PB недоступен — показываем пустое состояние
    render();
  });
</script>
</body>
</html>
