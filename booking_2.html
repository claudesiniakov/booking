<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Бронирование мест</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;700&family=Onest:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #17171e;
    --surface2: #1e1e28;
    --border: #2a2a38;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --free: #1a2a1a; --free-border: #2d4a2d; --free-text: #7ec87e;
    --booked: #2a1a1a; --booked-border: #4a2d2d; --booked-text: #c87e7e;
    --blocked: #161616; --blocked-border: #242424; --blocked-text: #3a3a3a;
    --mine: #1a1a2e; --mine-border: #4a4a8a; --mine-text: #9090e0;
    --zone-bg: #13131a; --zone-border: #222230;
    --shadow: 0 2px 20px rgba(0,0,0,0.45);
    --glow-free: rgba(126,200,126,0.12); --glow-mine: rgba(108,99,255,0.18);
    --bg-grad1: rgba(108,99,255,0.07); --bg-grad2: rgba(255,101,132,0.05);
  }
  [data-theme="light"] {
    --bg: #f0f0f5; --surface: #ffffff; --surface2: #f5f5fa; --border: #dddde8;
    --accent: #5a52e8; --accent2: #e84f6a; --text: #1a1a2e; --muted: #8888a0;
    --free: #edf8ed; --free-border: #b8ddb8; --free-text: #2e7a2e;
    --booked: #fdf0f0; --booked-border: #e8bbbb; --booked-text: #9a2e2e;
    --blocked: #f0f0f0; --blocked-border: #d8d8d8; --blocked-text: #b8b8b8;
    --mine: #eeeeff; --mine-border: #b0b0e0; --mine-text: #4040a0;
    --zone-bg: #f7f7fc; --zone-border: #e4e4ef;
    --shadow: 0 2px 16px rgba(0,0,0,0.08);
    --glow-free: rgba(46,122,46,0.08); --glow-mine: rgba(90,82,232,0.1);
    --bg-grad1: rgba(90,82,232,0.04); --bg-grad2: rgba(232,79,106,0.03);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Onest', sans-serif; min-height: 100vh;
    overflow-x: hidden; transition: background 0.3s, color 0.3s;
  }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 15%, var(--bg-grad1) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 80% 85%, var(--bg-grad2) 0%, transparent 60%);
    transition: background 0.3s;
  }

  /* ── LAYOUT ── */
  .app {
    position: relative; z-index: 1;
    max-width: 1200px; margin: 0 auto;
    padding: 32px 24px 64px;
    display: grid;
    grid-template-columns: 1fr 320px;
    grid-template-rows: auto auto auto 1fr;
    grid-template-areas:
      "header  header"
      "dates   dates"
      "name    name"
      "floor   bookings";
    gap: 0 24px;
    align-items: start;
  }

  /* ── HEADER ── */
  header {
    grid-area: header;
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 28px;
  }
  .logo { font-family: 'Unbounded', sans-serif; font-size: 10px; font-weight: 300; letter-spacing: 0.35em; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
  h1 { font-family: 'Unbounded', sans-serif; font-size: clamp(20px, 3vw, 28px); font-weight: 700; line-height: 1.15; }
  h1 span { color: var(--accent); }

  /* ── THEME TOGGLE ── */
  .theme-btn {
    flex-shrink: 0; width: 48px; height: 28px;
    background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: 14px; cursor: pointer; position: relative;
    transition: all 0.3s; margin-top: 6px; outline: none;
  }
  .theme-btn::after {
    content: ''; position: absolute; top: 4px; left: 4px;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--muted); transition: all 0.3s;
  }
  [data-theme="light"] .theme-btn { background: var(--accent); border-color: var(--accent); }
  [data-theme="light"] .theme-btn::after { left: calc(100% - 22px); background: #fff; }
  .theme-icon { font-size: 11px; position: absolute; top: 50%; transform: translateY(-50%); pointer-events: none; }
  .theme-icon.moon { left: 6px; }
  .theme-icon.sun  { right: 6px; }

  /* ── DATE STRIP ── */
  .date-nav {
    grid-area: dates;
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 20px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 10px 14px;
    box-shadow: var(--shadow); transition: background 0.3s, border-color 0.3s;
  }
  .date-nav button {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); width: 34px; height: 34px;
    border-radius: 9px; cursor: pointer; font-size: 15px;
    transition: all 0.2s; flex-shrink: 0;
  }
  .date-nav button:hover { border-color: var(--accent); color: var(--accent); }
  .date-strip { display: flex; gap: 6px; overflow-x: auto; flex: 1; scrollbar-width: none; }
  .date-strip::-webkit-scrollbar { display: none; }
  .date-chip {
    flex-shrink: 0; padding: 7px 12px; border-radius: 9px;
    background: var(--surface2); border: 1px solid var(--border);
    cursor: pointer; text-align: center; transition: all 0.2s;
  }
  .date-chip .wd { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
  .date-chip .d { font-size: 15px; font-weight: 600; font-family: 'Unbounded', sans-serif; }
  .date-chip:hover { border-color: var(--accent); }
  .date-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .date-chip.active .wd { color: rgba(255,255,255,0.65); }

  /* ── NAME INPUT ── */
  .name-row {
    grid-area: name;
    display: flex; gap: 10px; align-items: center; margin-bottom: 20px;
  }
  .name-row label { font-size: 11px; color: var(--muted); white-space: nowrap; font-family: 'Unbounded', sans-serif; letter-spacing: 0.07em; }
  .name-input {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 10px 16px; border-radius: 12px;
    font-family: 'Onest', sans-serif; font-size: 15px; outline: none;
    transition: border-color 0.2s, background 0.3s; box-shadow: var(--shadow);
  }
  .name-input:focus { border-color: var(--accent); }
  .name-input::placeholder { color: var(--muted); }

  /* ── FLOOR PLAN ── */
  .floor-col { grid-area: floor; }

  .room-wrap {
    display: flex; gap: 0; position: relative;
    background: var(--zone-bg); border: 1px solid var(--zone-border);
    border-radius: 22px; padding: 18px 18px 18px 18px;
    box-shadow: var(--shadow); transition: background 0.3s, border-color 0.3s;
  }
  .room-inner { flex: 1; display: flex; flex-direction: column; gap: 16px; }

  /* zone cards (no header/title now) */
  .zone {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px 16px 12px;
    transition: background 0.3s, border-color 0.3s;
  }

  .seats-row { display: grid; gap: 11px; }
  .seats-row.cols3 { grid-template-columns: repeat(3, 1fr); }

  /* ── SEAT ── */
  .seat {
    aspect-ratio: 4/3; border-radius: 11px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.22s cubic-bezier(.4,0,.2,1);
    position: relative; user-select: none; border: 1.5px solid; gap: 3px;
  }
  .seat-num { font-family: 'Unbounded', sans-serif; font-size: 16px; font-weight: 600; line-height: 1; }
  .seat-sub { font-size: 9px; font-weight: 500; text-align: center; padding: 0 4px; letter-spacing: 0.02em; line-height: 1.3; }

  .seat.free    { background: var(--free);    border-color: var(--free-border);    color: var(--free-text); }
  .seat.booked  { background: var(--booked);  border-color: var(--booked-border);  color: var(--booked-text); cursor: default; }
  .seat.mine    { background: var(--mine);    border-color: var(--mine-border);    color: var(--mine-text); }
  .seat.blocked { background: var(--blocked); border-color: var(--blocked-border); color: var(--blocked-text); cursor: not-allowed; opacity: 0.45; }

  .seat.free:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 8px 20px var(--glow-free); border-color: var(--free-text); }
  .seat.mine:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 6px 18px var(--glow-mine); border-color: var(--mine-text); }

  .seat .dot { width: 5px; height: 5px; border-radius: 50%; position: absolute; top: 8px; right: 8px; }
  .seat.free .dot    { background: var(--free-text); }
  .seat.booked .dot  { background: var(--booked-text); }
  .seat.mine .dot    { background: var(--mine-text); animation: pulse 2s infinite; }
  .seat.blocked .dot { background: var(--blocked-text); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

  /* cabinet */
  .cabinet-label {
    position: absolute; right: -1px; top: 50%; transform: translateY(-50%);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 0 22px 22px 0; border-left: none;
    padding: 14px 10px; writing-mode: vertical-rl;
    font-size: 9px; font-family: 'Unbounded', sans-serif;
    letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase;
    display: flex; align-items: center; gap: 5px;
    transition: background 0.3s, border-color 0.3s;
  }
  .cabinet-arrow { font-size: 11px; writing-mode: horizontal-tb; }

  /* legend */
  .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
  .legend-item { display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--muted); }
  .legend-dot { width: 9px; height: 9px; border-radius: 3px; border: 1.5px solid; }
  .legend-dot.free    { background: var(--free);    border-color: var(--free-border); }
  .legend-dot.booked  { background: var(--booked);  border-color: var(--booked-border); }
  .legend-dot.mine    { background: var(--mine);    border-color: var(--mine-border); }
  .legend-dot.blocked { background: var(--blocked); border-color: var(--blocked-border); }

  /* ────────────────────────────────────────────────
     BOOKINGS SIDEBAR
  ──────────────────────────────────────────────── */
  .bookings-col {
    grid-area: bookings;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 0;
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: background 0.3s, border-color 0.3s;
    display: flex; flex-direction: column;
  }

  .bookings-head {
    padding: 16px 18px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .bookings-head-title {
    font-family: 'Unbounded', sans-serif; font-size: 10px;
    letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase;
  }
  .bookings-filter {
    display: flex; gap: 4px;
  }
  .filter-btn {
    padding: 3px 9px; border-radius: 7px; font-size: 10px; font-family: 'Onest', sans-serif;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--muted); cursor: pointer; transition: all 0.18s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .bookings-body {
    flex: 1; overflow-y: auto; padding: 10px 12px 14px;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  .bookings-body::-webkit-scrollbar { width: 4px; }
  .bookings-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* empty state */
  .b-empty {
    text-align: center; padding: 36px 16px;
    color: var(--muted); font-size: 12px; line-height: 1.6;
  }
  .b-empty-icon { font-size: 28px; margin-bottom: 10px; opacity: 0.4; }

  /* day group */
  .b-day-group { margin-bottom: 14px; }
  .b-day-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 10px; border-radius: 9px;
    background: var(--surface2); border: 1px solid var(--border);
    cursor: pointer; user-select: none; transition: all 0.18s;
    margin-bottom: 6px;
  }
  .b-day-header:hover { border-color: var(--accent); }
  .b-day-header.collapsed { margin-bottom: 0; }
  .b-day-label {
    font-family: 'Unbounded', sans-serif; font-size: 10px;
    letter-spacing: 0.12em; color: var(--text); text-transform: uppercase;
  }
  .b-day-right { display: flex; align-items: center; gap: 8px; }
  .b-day-count {
    background: var(--accent); color: #fff;
    border-radius: 6px; padding: 1px 7px; font-size: 9px; font-weight: 600;
  }
  .b-day-count.empty { background: var(--surface); border: 1px solid var(--border); color: var(--muted); }
  .b-chevron {
    color: var(--muted); font-size: 10px; transition: transform 0.2s;
    width: 14px; text-align: center;
  }
  .b-day-header.collapsed .b-chevron { transform: rotate(-90deg); }

  .b-day-items { display: flex; flex-direction: column; gap: 5px; overflow: hidden; }
  .b-day-items.hidden { display: none; }

  /* booking row */
  .b-row {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px; border-radius: 10px;
    background: var(--zone-bg); border: 1px solid var(--zone-border);
    transition: border-color 0.18s;
  }
  .b-row:hover { border-color: var(--border); }
  .b-row.is-mine { border-color: var(--mine-border); background: var(--mine); }

  .b-seat-badge {
    flex-shrink: 0; width: 28px; height: 28px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Unbounded', sans-serif; font-size: 11px; font-weight: 600;
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  }
  .b-row.is-mine .b-seat-badge { background: var(--mine); border-color: var(--mine-border); color: var(--mine-text); }

  .b-info { flex: 1; min-width: 0; }
  .b-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .b-row.is-mine .b-name { color: var(--mine-text); }
  .b-time { font-size: 10px; color: var(--muted); margin-top: 1px; }

  .b-cancel-btn {
    flex-shrink: 0; width: 22px; height: 22px; border-radius: 6px;
    border: 1px solid var(--border); background: transparent;
    color: var(--muted); cursor: pointer; font-size: 12px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.18s; opacity: 0;
  }
  .b-row:hover .b-cancel-btn { opacity: 1; }
  .b-cancel-btn:hover { background: var(--booked); border-color: var(--booked-border); color: var(--booked-text); }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.55); backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  .modal-overlay.show { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 22px; padding: 28px; width: 100%; max-width: 340px;
    transform: translateY(18px) scale(0.97);
    transition: transform 0.3s cubic-bezier(.4,0,.2,1), background 0.3s;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .modal-overlay.show .modal { transform: none; }
  .modal h2 { font-family: 'Unbounded', sans-serif; font-size: 17px; margin-bottom: 5px; }
  .modal .sub { font-size: 12px; color: var(--muted); margin-bottom: 20px; }
  .modal .info-row { display: flex; justify-content: space-between; margin-bottom: 9px; font-size: 13px; }
  .modal .info-row span:first-child { color: var(--muted); }
  .modal .info-row span:last-child { font-weight: 500; }
  .modal-btns { display: flex; gap: 9px; margin-top: 20px; }
  .btn { flex: 1; padding: 11px; border-radius: 11px; border: none; font-family: 'Onest', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { filter: brightness(1.15); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(108,99,255,0.35); }
  .btn-danger { background: rgba(255,101,132,0.12); color: var(--accent2); border: 1px solid rgba(255,101,132,0.3); }
  .btn-danger:hover { background: rgba(255,101,132,0.22); }
  .btn-cancel { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .btn-cancel:hover { color: var(--text); border-color: var(--muted); }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(70px);
    background: var(--surface2); border: 1px solid var(--border);
    padding: 11px 22px; border-radius: 13px; font-size: 12px; font-weight: 500;
    transition: transform 0.38s cubic-bezier(.4,0,.2,1);
    z-index: 200; white-space: nowrap; box-shadow: 0 8px 28px rgba(0,0,0,0.3);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--free-border); color: var(--free-text); }
  .toast.cancel  { border-color: var(--booked-border); color: var(--booked-text); }

  /* ── RESPONSIVE ── */
  @media (max-width: 760px) {
    .app {
      grid-template-columns: 1fr;
      grid-template-areas:
        "header"
        "dates"
        "name"
        "floor"
        "bookings";
      gap: 0;
    }
    .bookings-col { margin-top: 20px; max-height: 380px; }
    .cabinet-label { display: none; }
  }
  @media (max-width: 480px) {
    .app { padding: 20px 14px 48px; }
    .room-wrap { padding: 12px; }
    .seats-row { gap: 8px; }
    .seat-num { font-size: 13px; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header>
    <div>
      <div class="logo">Workspace</div>
      <h1>Бронирование <span>рабочих мест</span></h1>
    </div>
    <button class="theme-btn" id="themeBtn" title="Сменить тему">
      <span class="theme-icon moon">🌙</span>
      <span class="theme-icon sun">☀️</span>
    </button>
  </header>

  <!-- DATES -->
  <div class="date-nav">
    <button id="prevWeek">&#8249;</button>
    <div class="date-strip" id="dateStrip"></div>
    <button id="nextWeek">&#8250;</button>
  </div>

  <!-- NAME -->
  <div class="name-row">
    <label>Ваше имя</label>
    <input class="name-input" id="userName" type="text" placeholder="Иван Иванов" />
  </div>

  <!-- FLOOR PLAN -->
  <div class="floor-col">
    <div class="room-wrap">
      <div class="room-inner">
        <div class="zone">
          <div class="seats-row cols3" id="gridA"></div>
        </div>
        <div class="zone">
          <div class="seats-row cols3" id="gridB"></div>
        </div>
      </div>
      <div class="cabinet-label"><span class="cabinet-arrow">←</span>кабинет</div>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot free"></div>Свободно</div>
      <div class="legend-item"><div class="legend-dot booked"></div>Занято</div>
      <div class="legend-item"><div class="legend-dot mine"></div>Моё</div>
      <div class="legend-item"><div class="legend-dot blocked"></div>Недоступно</div>
    </div>
  </div>

  <!-- BOOKINGS SIDEBAR -->
  <div class="bookings-col">
    <div class="bookings-head">
      <span class="bookings-head-title">Бронирования</span>
      <div class="bookings-filter">
        <button class="filter-btn active" data-filter="all">Все</button>
        <button class="filter-btn" data-filter="week">Неделя</button>
        <button class="filter-btn" data-filter="mine">Мои</button>
      </div>
    </div>
    <div class="bookings-body" id="bookingsBody"></div>
  </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Место 00</h2>
    <p class="sub" id="modalSub"></p>
    <div class="info-row"><span>Дата</span><span id="modalDate">—</span></div>
    <div class="info-row" id="modalOwnerRow"><span>Занято</span><span id="modalOwner">—</span></div>
    <div class="modal-btns" id="modalBtns"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── CONFIG ───────────────────────────────────────────────────────────────────
  const BLOCKED = [14, 15];
  const ZONE_A  = [19, 20, 21];
  const ZONE_B  = [16, 17, 18, 13, 14, 15];
  const ALL_SEATS = [...ZONE_A, ...ZONE_B];
  const WD_FULL = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
  const WD_SHORT = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
  const MONTHS = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];

  let bookings    = JSON.parse(localStorage.getItem('ws_bookings3') || '{}');
  let selectedDate = todayStr();
  let weekOffset  = 0;
  let bFilter     = 'all';
  // collapsed state per date key
  let collapsed   = {};

  function todayStr() { return new Date().toISOString().slice(0, 10); }
  function save()     { localStorage.setItem('ws_bookings3', JSON.stringify(bookings)); }

  // ── THEME ────────────────────────────────────────────────────────────────────
  const html = document.documentElement;
  let theme = localStorage.getItem('ws_theme') || 'dark';
  html.setAttribute('data-theme', theme);
  document.getElementById('themeBtn').onclick = () => {
    theme = theme === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', theme);
    localStorage.setItem('ws_theme', theme);
  };

  // ── DATES ────────────────────────────────────────────────────────────────────
  function renderDates() {
    const strip = document.getElementById('dateStrip');
    strip.innerHTML = '';
    const base = new Date();
    base.setDate(base.getDate() + weekOffset * 7);
    const day = base.getDay();
    const monday = new Date(base);
    monday.setDate(base.getDate() - (day === 0 ? 6 : day - 1));
    for (let i = 0; i < 7; i++) {
      const d = new Date(monday);
      d.setDate(monday.getDate() + i);
      const str = d.toISOString().slice(0, 10);
      const chip = document.createElement('div');
      chip.className = 'date-chip' + (str === selectedDate ? ' active' : '');
      chip.innerHTML = `<div class="wd">${WD_SHORT[d.getDay()]}</div><div class="d">${d.getDate()}</div>`;
      chip.onclick = () => { selectedDate = str; renderDates(); renderSeats(); renderBookings(); };
      strip.appendChild(chip);
    }
  }
  document.getElementById('prevWeek').onclick = () => { weekOffset--; renderDates(); };
  document.getElementById('nextWeek').onclick = () => { weekOffset++; renderDates(); };

  // ── SEATS ────────────────────────────────────────────────────────────────────
  function getState(seat, date) {
    date = date || selectedDate;
    if (BLOCKED.includes(seat)) return 'blocked';
    const owner = bookings[date]?.[seat];
    if (!owner) return 'free';
    const me = document.getElementById('userName').value.trim();
    if (me && owner.toLowerCase() === me.toLowerCase()) return 'mine';
    return 'booked';
  }

  function makeSeat(seat) {
    const state = getState(seat);
    const owner = bookings[selectedDate]?.[seat] || '';
    const el = document.createElement('div');
    el.className = `seat ${state}`;
    let sub = '';
    if (state === 'booked')  sub = `<div class="seat-sub">${owner}</div>`;
    if (state === 'mine')    sub = `<div class="seat-sub">моё</div>`;
    if (state === 'free')    sub = `<div class="seat-sub" style="opacity:.3">свободно</div>`;
    if (state === 'blocked') sub = `<div class="seat-sub">—</div>`;
    el.innerHTML = `<div class="dot"></div><div class="seat-num">${seat}</div>${sub}`;
    if (state === 'free' || state === 'mine') el.onclick = () => openModal(seat, state);
    return el;
  }

  function renderSeats() {
    const gA = document.getElementById('gridA');
    const gB = document.getElementById('gridB');
    gA.innerHTML = ''; gB.innerHTML = '';
    ZONE_A.forEach(s => gA.appendChild(makeSeat(s)));
    ZONE_B.forEach(s => gB.appendChild(makeSeat(s)));
  }

  document.getElementById('userName').addEventListener('input', () => { renderSeats(); renderBookings(); });

  // ── BOOKINGS PANEL ───────────────────────────────────────────────────────────
  function fmtDateShort(str) {
    const [y, m, d] = str.split('-');
    const dt = new Date(str);
    return `${WD_FULL[dt.getDay()]}, ${+d} ${MONTHS[+m-1]}`;
  }

  function getFilteredDates() {
    const me = document.getElementById('userName').value.trim().toLowerCase();
    const today = todayStr();

    // collect all dates that have bookings
    let dates = Object.keys(bookings)
      .filter(d => Object.keys(bookings[d] || {}).length > 0)
      .sort();

    if (bFilter === 'week') {
      // show only dates within ±3 days from selectedDate
      const sel = new Date(selectedDate);
      dates = dates.filter(d => {
        const diff = (new Date(d) - sel) / 86400000;
        return diff >= -3 && diff <= 10;
      });
    }

    if (bFilter === 'mine') {
      dates = dates.filter(d =>
        Object.values(bookings[d] || {}).some(name => name.toLowerCase() === me)
      );
    }

    return dates;
  }

  function renderBookings() {
    const body = document.getElementById('bookingsBody');
    const me = document.getElementById('userName').value.trim().toLowerCase();
    const dates = getFilteredDates();

    if (dates.length === 0) {
      body.innerHTML = `
        <div class="b-empty">
          <div class="b-empty-icon">📅</div>
          ${bFilter === 'mine' && !me ? 'Введите имя, чтобы<br>увидеть свои брони' : 'Нет бронирований'}
        </div>`;
      return;
    }

    body.innerHTML = '';

    dates.forEach(dateStr => {
      const dayBookings = bookings[dateStr] || {};
      const entries = Object.entries(dayBookings); // [[seat, name], ...]
      const filteredEntries = bFilter === 'mine'
        ? entries.filter(([, name]) => name.toLowerCase() === me)
        : entries;

      if (filteredEntries.length === 0) return;

      const isCollapsed = collapsed[dateStr];
      const today = todayStr();
      const isToday = dateStr === today;
      const isSel = dateStr === selectedDate;

      const group = document.createElement('div');
      group.className = 'b-day-group';

      const hdr = document.createElement('div');
      hdr.className = 'b-day-header' + (isCollapsed ? ' collapsed' : '');
      hdr.innerHTML = `
        <span class="b-day-label">${isToday ? '⚡ Сегодня' : isSel ? '▸ ' + fmtDateShort(dateStr) : fmtDateShort(dateStr)}</span>
        <span class="b-day-right">
          <span class="b-day-count${filteredEntries.length === 0 ? ' empty' : ''}">${filteredEntries.length}</span>
          <span class="b-chevron">▾</span>
        </span>`;
      hdr.onclick = () => {
        collapsed[dateStr] = !collapsed[dateStr];
        renderBookings();
      };

      const items = document.createElement('div');
      items.className = 'b-day-items' + (isCollapsed ? ' hidden' : '');

      filteredEntries
        .sort(([a], [b]) => +a - +b)
        .forEach(([seat, name]) => {
          const isMine = name.toLowerCase() === me;
          const row = document.createElement('div');
          row.className = 'b-row' + (isMine ? ' is-mine' : '');
          row.innerHTML = `
            <div class="b-seat-badge">${seat}</div>
            <div class="b-info">
              <div class="b-name">${name}</div>
              <div class="b-time">${dateStr === today ? 'сегодня' : fmtDateShort(dateStr).split(', ')[1] || ''}</div>
            </div>
            ${isMine ? `<button class="b-cancel-btn" title="Отменить">✕</button>` : ''}
          `;
          if (isMine) {
            row.querySelector('.b-cancel-btn').onclick = (e) => {
              e.stopPropagation();
              doCancel(+seat, dateStr);
            };
          }
          items.appendChild(row);
        });

      group.appendChild(hdr);
      group.appendChild(items);
      body.appendChild(group);
    });
  }

  // filter buttons
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      bFilter = btn.dataset.filter;
      renderBookings();
    };
  });

  // ── MODAL ────────────────────────────────────────────────────────────────────
  function fmtDate(str) {
    const [y, m, d] = str.split('-');
    return `${+d} ${MONTHS[+m-1]} ${y}`;
  }

  function openModal(seat, state) {
    document.getElementById('modalTitle').textContent = `Место ${seat}`;
    document.getElementById('modalDate').textContent = fmtDate(selectedDate);
    const ownerRow = document.getElementById('modalOwnerRow');
    const btns = document.getElementById('modalBtns');
    if (state === 'mine') {
      document.getElementById('modalSub').textContent = 'Вы забронировали это место';
      ownerRow.style.display = 'flex';
      document.getElementById('modalOwner').textContent = bookings[selectedDate][seat];
      btns.innerHTML = `<button class="btn btn-danger" id="cancelBtn">Отменить бронь</button><button class="btn btn-cancel" id="closeBtn">Закрыть</button>`;
      document.getElementById('cancelBtn').onclick = () => { doCancel(seat, selectedDate); closeModal(); };
      document.getElementById('closeBtn').onclick = closeModal;
    } else {
      document.getElementById('modalSub').textContent = 'Забронировать на день?';
      ownerRow.style.display = 'none';
      btns.innerHTML = `<button class="btn btn-primary" id="bookBtn">Забронировать</button><button class="btn btn-cancel" id="closeBtn">Отмена</button>`;
      document.getElementById('bookBtn').onclick = () => { doBook(seat); closeModal(); };
      document.getElementById('closeBtn').onclick = closeModal;
    }
    document.getElementById('modalOverlay').classList.add('show');
  }
  function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
  document.getElementById('modalOverlay').onclick = e => { if (e.target === e.currentTarget) closeModal(); };

  // ── ACTIONS ──────────────────────────────────────────────────────────────────
  function doBook(seat) {
    const name = document.getElementById('userName').value.trim();
    if (!name) { showToast('Введите ваше имя', 'cancel'); return; }
    if (!bookings[selectedDate]) bookings[selectedDate] = {};
    bookings[selectedDate][seat] = name;
    save(); renderSeats(); renderBookings();
    showToast(`✓ Место ${seat} забронировано`, 'success');
  }

  function doCancel(seat, date) {
    date = date || selectedDate;
    if (bookings[date]) {
      delete bookings[date][seat];
      if (Object.keys(bookings[date]).length === 0) delete bookings[date];
      save(); renderSeats(); renderBookings();
      showToast(`Бронь места ${seat} отменена`, 'cancel');
    }
  }

  // ── TOAST ────────────────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ── INIT ─────────────────────────────────────────────────────────────────────
  renderDates();
  renderSeats();
  renderBookings();
</script>
</body>
</html>
